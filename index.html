function dashSort(col) {
  if (state.dashSortCol === col) {
    state.dashSortDir = state.dashSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    state.dashSortCol = col;
    state.dashSortDir = 'asc';
  }
  renderDashboardTable();
}

function renderDashboardTable() {
  const el = document.getElementById('dash-content');
  const accounts = [...getDashFilteredAccounts()];
  const repName = (uid) => { const p = state.profiles.find(pr => pr.id === uid); return p ? p.full_name : '—'; };
  const dir = state.dashSortDir === 'asc' ? 1 : -1;

  // Pre-compute progress for sorting
  const progCache = {};
  accounts.forEach(a => { progCache[a.id] = getStageCompletion(a.id, a.current_stage); });

  // Pre-compute last activity for sorting
  const actCache = {};
  accounts.forEach(a => {
    const cl = state.checklist[a.id] || [];
    actCache[a.id] = cl.reduce((m,c) => c.completed_at && c.completed_at > m ? c.completed_at : m, '');
  });

  accounts.sort((a, b) => {
    let v = 0;
    switch (state.dashSortCol) {
      case 'company': v = a.company_name.localeCompare(b.company_name); break;
      case 'progress': v = (a.current_stage - b.current_stage) || (progCache[a.id].pct - progCache[b.id].pct); break;
      case 'rep': v = repName(a.assigned_to).localeCompare(repName(b.assigned_to)); break;
      case 'revenue': v = toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency) - toDisplayCurrency(parseFloat(b.estimated_revenue)||0, b.currency); break;
      case 'activity': v = (actCache[a.id]||'').localeCompare(actCache[b.id]||''); break;
      default: v = a.tier - b.tier;
    }
    return v * dir || a.company_name.localeCompare(b.company_name);
  });

  const sortIcon = (col) => {
    if (state.dashSortCol !== col) return '<span style="opacity:.3;font-size:10px"> ⇅</span>';
    return state.dashSortDir === 'asc' ? '<span style="font-size:10px"> ↑</span>' : '<span style="font-size:10px"> ↓</span>';
  };
  const thStyle = 'cursor:pointer;user-select:none;white-space:nowrap';
  const thActive = (col) => state.dashSortCol === col ? ';color:var(--vic-orange)' : '';

  const stageColors = ['','#94A3B8','#38BDF8','#34D399','#FBBF24','#F58220'];
  el.innerHTML = `<div class="dash-section"><div class="table-wrap">
    <table class="data-table">
      <thead><tr>
        <th style="${thStyle}${thActive('company')}" onclick="dashSort('company')">Company${sortIcon('company')}</th>
        <th style="${thStyle};min-width:180px;width:40%${thActive('progress')}" onclick="dashSort('progress')">Progress${sortIcon('progress')}</th>
        <th style="${thStyle};white-space:nowrap${thActive('revenue')}" onclick="dashSort('revenue')">Revenue${sortIcon('revenue')}</th>
        <th style="${thStyle};white-space:nowrap${thActive('rep')}" onclick="dashSort('rep')">Rep${sortIcon('rep')}</th>
        <th style="${thStyle};text-align:center;white-space:nowrap${thActive('activity')}" onclick="dashSort('activity')">Last Activity${sortIcon('activity')}</th>
      </tr></thead>
      <tbody>
        ${accounts.map(a => {
          const comp = progCache[a.id];
          const rev = toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency);
          let statusBar = '<div style="display:flex;gap:3px;align-items:center">';
          for (let s = 1; s <= 5; s++) {
            const sc = getStageCompletion(a.id, s);
            const done = isStageComplete(a.id, s);
            const isCur = s === a.current_stage;
            const bg = done ? stageColors[s] : stageColors[s] + '40';
            statusBar += `<div style="flex:1;min-width:16px;height:8px;background:${bg};border-radius:4px;overflow:hidden;position:relative">`;
            if (isCur) statusBar += `<div style="width:${sc.pct}%;height:100%;background:${stageColors[s]};border-radius:2px"></div>`;
            statusBar += '</div>';
          }
          statusBar += `</div>`;
          return `<tr onclick="showAccountDetail('${a.id}')" style="cursor:pointer">
            <td style="white-space:nowrap"><strong style="color:var(--g700)">${esc(a.company_name)}</strong>${a.hq_city ? `<span style="color:var(--g400);font-weight:400"> — ${esc(a.hq_city)}</span>` : ''}</td>
            <td>${statusBar}</td>
            <td style="font-size:13px;color:var(--g500)">${fxSymbol()}${formatNumber(Math.round(rev))}</td>
            <td style="font-size:13px;color:var(--g500);white-space:nowrap">${repName(a.assigned_to)}</td>
            <td style="font-size:12px;color:var(--g400);white-space:nowrap;text-align:center">${actCache[a.id] ? new Date(actCache[a.id]).toLocaleDateString('en-AU',{day:'numeric',month:'short'}) : '<span style="color:#ef4444">Never</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div></div>`;
}

// ======================== RENDER: MASTER MATRIX VIEW ========================
function setMatrixCellFromTable(accountId, rowId, statusId) {
  const cols = state.matrixConfig.cols;
  if (!cols || !cols.length) return;
  const lastColId = cols[cols.length - 1].id;
  setMatrixCell(accountId, rowId, lastColId, statusId);
  if (state.currentView === 'dashboard') renderDashboard(); else renderMatrixView();
}
function renderMatrixView(targetId, embedded) {
  const el = document.getElementById(targetId || 'view-matrix');
  const allAccounts = getVisibleAccounts();
  const rows = state.matrixConfig.rows;
  const cols = state.matrixConfig.cols;
  const statuses = state.matrixConfig.statuses;
  const hasFilter = state.dashFilterRep.length > 0 || state.dashFilterManager.length > 0 || state.dashFilterRegion.length > 0 || state.dashFilterCountry.length > 0 || state.dashFilterStage !== 'all' || state.dashFilterTier.length > 0 || state.dashFilterSector.length > 0 || (state.dashSearch||'').trim() !== '';

  if (!rows.length || !cols.length) {
    el.innerHTML = (embedded ? '' : '<div class="view-header"><h1>Acceptance Matrix</h1></div>') + '<div style="padding:24px;text-align:center;color:var(--g400)">No matrix configured yet. Set up product rows and milestone columns in Admin.</div>';
    return;
  }

  // Build filters (same pattern as dashboard)
  const reps = (state.profiles || []).filter(p => (p.role === 'rep' || p.role === 'manager' || p.role === 'admin') && p.role !== 'director').sort((a,b) => (a.full_name||'').localeCompare(b.full_name||''));
  const scopedReps = state.dashFilterCountry.length > 0 ? reps.filter(p => state.dashFilterCountry.includes(p.country)) : reps;
  const hasReports = new Set(scopedReps.filter(p => p.reports_to).map(p => p.reports_to));
  const managers = scopedReps.filter(p => hasReports.has(p.id));
  const activeReps = scopedReps.filter(p => !hasReports.has(p.id)).sort((a,b) => (a.full_name||'').localeCompare(b.full_name||''));
  const auRegions = ['NT','QLD','WA','SA','NSW','ACT','VIC','TAS'];
  const nzRegionCodes = ['NTL','AKL','WKO','BOP','GIS','HKB','TKI','MWT','WGN','TSM','NSN','MBH','WTC','CAN','OTA','STL'];
  const acctRegions = new Set();
  allAccounts.forEach(a => (a.regions||'').split(',').map(s=>s.trim()).filter(Boolean).forEach(r => acctRegions.add(r)));
  const activeNZ = nzRegionCodes.filter(r => acctRegions.has(r));
  const activeAU = auRegions.filter(r => acctRegions.has(r));
  const visibleRegions = (state.dashFilterCountry.length===1 && state.dashFilterCountry[0]==='AU') ? activeAU : (state.dashFilterCountry.length===1 && state.dashFilterCountry[0]==='NZ') ? activeNZ : [...activeAU, ...activeNZ];
  const mgrOrder = ['Steve','David','Josh','Ben'];
  const filteredMgrs = [...managers].sort((a,b) => { const ia = mgrOrder.findIndex(n => (a.full_name||'').startsWith(n)); const ib = mgrOrder.findIndex(n => (b.full_name||'').startsWith(n)); return (ia===-1?99:ia) - (ib===-1?99:ib); });

  const _mxDropFor = { dashFilterCountry:'mx-fd-country', dashFilterRegion:'mx-fd-region', dashFilterTier:'mx-fd-tier', dashFilterManager:'mx-fd-mgr', dashFilterRep:'mx-fd-rep' };
  const mxFd = (label, key, val) => {
    const multi = key === 'dashFilterRep' || key === 'dashFilterManager' || key === 'dashFilterRegion' || key === 'dashFilterTier' || key === 'dashFilterCountry' || key === 'dashFilterSector';
    const active = multi ? state[key].includes(val) : state[key] === val;
    const reopen = multi && _mxDropFor[key] ? `setTimeout(()=>{const d=document.getElementById('${_mxDropFor[key]}');if(d)d.classList.add('open')},0);` : '';
    return `<div class="fd-item${active?' active':''}" onclick="event.stopPropagation();setDashFilter('${key}','${val}');renderMatrixView();${reopen}">${label}</div>`;
  };
  const _tierName = v => v === '-1' ? 'Owner' : v === '0' ? 'Engineer' : 'T' + v;

  const countryLabel = state.dashFilterCountry.length > 0 ? state.dashFilterCountry.join(', ') : 'Country';
  const regionLabel = state.dashFilterRegion.length ? state.dashFilterRegion.length + ' selected' : 'Region';
  const tierLabel = state.dashFilterTier.length > 0 ? (state.dashFilterTier.length === 1 ? _tierName(state.dashFilterTier[0]) : state.dashFilterTier.length + ' selected') : 'Stakeholder';
  const stageLabel = state.dashFilterStage !== 'all' ? STAGES[parseInt(state.dashFilterStage)].name : 'Stage';
  const mgrLabel = state.dashFilterManager.length ? state.dashFilterManager.length + ' selected' : 'Manager';
  const repLabel = state.dashFilterRep.length ? state.dashFilterRep.length + ' selected' : 'Rep';

  const tags = [];
  state.dashFilterCountry.forEach(c => tags.push({ label: c, key: 'dashFilterCountry', val: c, css: 't-country' }));
  state.dashFilterRegion.forEach(r => tags.push({ label: r, key: 'dashFilterRegion', val: r, css: 't-region' }));
  state.dashFilterTier.forEach(v => tags.push({ label: _tierName(v), key: 'dashFilterTier', val: v, css: 't-tier' }));
  if (state.dashFilterStage !== 'all') tags.push({ label: STAGES[parseInt(state.dashFilterStage)].name, key: 'dashFilterStage', val: state.dashFilterStage, css: 't-stage' + state.dashFilterStage });
  state.dashFilterManager.forEach(id => { const p = (state.profiles||[]).find(x=>x.id===id); tags.push({ label: p?.full_name||'—', key: 'dashFilterManager', val: id, css: 't-manager' }); });
  state.dashFilterRep.filter(id => !state.dashFilterManager.includes(id)).map(id => { const p = (state.profiles||[]).find(x=>x.id===id); return { label: p?.full_name||'—', key: 'dashFilterRep', val: id, css: 't-rep' }; }).sort((a,b) => a.label.localeCompare(b.label)).forEach(t => tags.push(t));

  const filterHtml = `
    <div class="fd-row">
      <div class="fd-wrap" id="mx-fd-country" onclick="toggleFilterDrop('mx-fd-country',event)">
        <div class="fd-btn${state.dashFilterCountry.length?' has-val':''}">${countryLabel} <span style="font-size:10px;opacity:.5">▼</span></div>
        <div class="fd-menu">${mxFd('AU','dashFilterCountry','AU')}${mxFd('NZ','dashFilterCountry','NZ')}</div>
      </div>
      <div class="fd-wrap" id="mx-fd-region" onclick="toggleFilterDrop('mx-fd-region',event)">
        <div class="fd-btn${state.dashFilterRegion.length?' has-val':''}">${regionLabel} <span style="font-size:10px;opacity:.5">▼</span></div>
        <div class="fd-menu">${visibleRegions.map(r => mxFd(r,'dashFilterRegion',r)).join('')}</div>
      </div>
      <div class="fd-wrap" id="mx-fd-tier" onclick="toggleFilterDrop('mx-fd-tier',event)">
        <div class="fd-btn${state.dashFilterTier.length?' has-val':''}">${tierLabel} <span style="font-size:10px;opacity:.5">▼</span></div>
        <div class="fd-menu">${mxFd('Owner','dashFilterTier','-1')}${mxFd('Engineer','dashFilterTier','0')}${mxFd('Tier 1','dashFilterTier','1')}${mxFd('Tier 2','dashFilterTier','2')}${mxFd('Tier 3','dashFilterTier','3')}</div>
      </div>
      <div class="fd-wrap" id="mx-fd-stage" onclick="toggleFilterDrop('mx-fd-stage',event)">
        <div class="fd-btn${state.dashFilterStage!=='all'?' has-val':''}">${stageLabel} <span style="font-size:10px;opacity:.5">▼</span></div>
        <div class="fd-menu">${[1,2,3,4,5].map(s => mxFd(STAGES[s].name,'dashFilterStage',String(s))).join('')}</div>
      </div>
      <div class="fd-wrap" id="mx-fd-mgr" onclick="toggleFilterDrop('mx-fd-mgr',event)">
        <div class="fd-btn${state.dashFilterManager.length?' has-val':''}">${mgrLabel} <span style="font-size:10px;opacity:.5">▼</span></div>
        <div class="fd-menu">${filteredMgrs.map(p => mxFd(p.full_name||'—','dashFilterManager',p.id)).join('')}</div>
      </div>
      <div class="fd-wrap" id="mx-fd-rep" onclick="toggleFilterDrop('mx-fd-rep',event)">
        <div class="fd-btn${state.dashFilterRep.length?' has-val':''}">${repLabel} <span style="font-size:10px;opacity:.5">▼</span></div>
        <div class="fd-menu">${activeReps.map(p => mxFd(p.full_name||'—','dashFilterRep',p.id)).join('')}</div>
      </div>
    </div>
    ${tags.length ? `<div class="fd-tags">${tags.map(t => `<div class="fd-tag ${t.css}" onclick="event.stopPropagation();removeTag('${t.key}','${t.val}');renderMatrixView()">${t.label} ×</div>`).join('')}</div>` : ''}`;

  const accts = getDashFilteredAccounts().sort((a,b) => a.company_name.localeCompare(b.company_name));

  // ---- KPI SCORECARDS ----
  const approvedStatus = statuses.find(s => s.label === 'Approved');
  const rejectedStatus = statuses.find(s => s.label === 'Not Allowed');
  const naStatus = statuses.find(s => s.label === 'N/A');
  const inProgressStatus = statuses.find(s => s.label === 'In Progress');

  let totalApproved = 0, totalRejected = 0, totalInProgress = 0, totalNA = 0, totalCells = 0;
  const perProduct = {};
  rows.forEach(r => perProduct[r.id] = { approved: 0, inProgress: 0, rejected: 0, total: 0, eligible: 0 });

  accts.forEach(a => {
    const data = state.matrixData[a.id] || [];
    rows.forEach(row => {
      cols.forEach(col => {
        totalCells++;
        perProduct[row.id].total++;
        const cell = data.find(d => d.row_id === row.id && d.col_id === col.id);
        if (cell) {
          if (approvedStatus && cell.status_id === approvedStatus.id) { totalApproved++; perProduct[row.id].approved++; }
          else if (rejectedStatus && cell.status_id === rejectedStatus.id) { totalRejected++; perProduct[row.id].rejected++; }
          else if (naStatus && cell.status_id === naStatus.id) { totalNA++; }
          else if (cell.status_id && (!naStatus || cell.status_id !== naStatus.id)) {
            const st = statuses.find(s => s.id === cell.status_id);
            if (st && st.label !== 'Not Started') { totalInProgress++; perProduct[row.id].inProgress++; }
          }
        }
      });
      perProduct[row.id].eligible = perProduct[row.id].total - (naStatus ? (state.matrixData[accts[0]?.id] || []).filter(d => d.row_id === row.id && naStatus && d.status_id === naStatus.id).length * 0 : 0);
    });
  });

  // Recalc eligible per product properly
  rows.forEach(r => {
    let naCount = 0;
    accts.forEach(a => {
      const data = state.matrixData[a.id] || [];
      cols.forEach(col => {
        const cell = data.find(d => d.row_id === r.id && d.col_id === col.id);
        if (cell && naStatus && cell.status_id === naStatus.id) naCount++;
      });
    });
    perProduct[r.id].eligible = perProduct[r.id].total - naCount;
  });

  const totalEligible = totalCells - totalNA;
  const overallRate = totalEligible > 0 ? Math.round(totalApproved / totalEligible * 100) : 0;
  const scoreColor = overallRate >= 75 ? '#34D399' : overallRate >= 40 ? '#FBBF24' : overallRate > 0 ? '#F58220' : '#94A3B8';

  // Per-account acceptance for scoring
  const acctScores = accts.map(a => {
    const data = state.matrixData[a.id] || [];
    let approved = 0, eligible = 0;
    rows.forEach(row => cols.forEach(col => {
      const cell = data.find(d => d.row_id === row.id && d.col_id === col.id);
      if (cell && naStatus && cell.status_id === naStatus.id) return;
      eligible++;
      if (cell && approvedStatus && cell.status_id === approvedStatus.id) approved++;
    }));
    return { ...a, mxApproved: approved, mxEligible: eligible, mxRate: eligible > 0 ? Math.round(approved / eligible * 100) : 0 };
  });

  // Movement KPIs — count accounts by acceptance tier
  const fullyAccepted = acctScores.filter(a => a.mxRate === 100 && a.mxEligible > 0).length;
  const highAcceptance = acctScores.filter(a => a.mxRate >= 75 && a.mxRate < 100).length;
  const midAcceptance = acctScores.filter(a => a.mxRate >= 25 && a.mxRate < 75).length;
  const lowAcceptance = acctScores.filter(a => a.mxRate > 0 && a.mxRate < 25).length;
  const noAcceptance = acctScores.filter(a => a.mxRate === 0).length;

  let kpiHtml = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px">
    <div style="background:var(--white);border:1px solid var(--g150);border-radius:8px;padding:12px;text-align:center">
      <div style="font-size:28px;font-weight:700;color:${scoreColor}">${overallRate}%</div>
      <div style="font-size:10px;text-transform:uppercase;font-weight:600;color:var(--g400);margin-top:2px">Overall Acceptance</div>
    </div>
    <div style="background:var(--white);border:1px solid var(--g150);border-radius:8px;padding:12px;text-align:center">
      <div style="font-size:28px;font-weight:700;color:#34D399">${totalApproved}</div>
      <div style="font-size:10px;text-transform:uppercase;font-weight:600;color:var(--g400);margin-top:2px">Approved</div>
    </div>
    <div style="background:var(--white);border:1px solid var(--g150);border-radius:8px;padding:12px;text-align:center">
      <div style="font-size:28px;font-weight:700;color:#38BDF8">${totalInProgress}</div>
      <div style="font-size:10px;text-transform:uppercase;font-weight:600;color:var(--g400);margin-top:2px">In Progress</div>
    </div>
    <div style="background:var(--white);border:1px solid var(--g150);border-radius:8px;padding:12px;text-align:center">
      <div style="font-size:28px;font-weight:700;color:#EF4444">${totalRejected}</div>
      <div style="font-size:10px;text-transform:uppercase;font-weight:600;color:var(--g400);margin-top:2px">Not Allowed</div>
    </div>
    <div style="background:var(--white);border:1px solid var(--g150);border-radius:8px;padding:12px;text-align:center">
      <div style="font-size:28px;font-weight:700;color:var(--vic-orange)">${fullyAccepted}</div>
      <div style="font-size:10px;text-transform:uppercase;font-weight:600;color:var(--g400);margin-top:2px">Fully Accepted</div>
    </div>
  </div>`;

  // Per-product acceptance bars
  kpiHtml += `<div style="background:var(--white);border:1px solid var(--g150);border-radius:8px;padding:12px 16px;margin-bottom:12px">
    <h4 style="font-size:13px;margin:0 0 10px;color:var(--g600)">Product Acceptance</h4>
    <div style="display:flex;flex-direction:column;gap:8px">`;
  rows.forEach(r => {
    const pp = perProduct[r.id];
    const pct = pp.eligible > 0 ? Math.round(pp.approved / pp.eligible * 100) : 0;
    const pColor = pct > 0 ? '#F58220' : '#94A3B8';
    kpiHtml += `<div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:12px;font-weight:600;min-width:120px;color:var(--g700)">${esc(r.label)}</span>
      <div style="flex:1;height:16px;background:var(--g100);border-radius:4px;overflow:hidden;display:flex">
        ${pp.approved ? `<div style="width:${pp.approved/pp.eligible*100}%;background:#34D399;transition:width .3s"></div>` : ''}
        ${pp.inProgress ? `<div style="width:${pp.inProgress/pp.eligible*100}%;background:#38BDF8;transition:width .3s"></div>` : ''}
        ${pp.rejected ? `<div style="width:${pp.rejected/pp.eligible*100}%;background:#EF4444;transition:width .3s"></div>` : ''}
      </div>
      <span style="font-size:13px;font-weight:700;min-width:40px;text-align:right;color:${pColor}">${pct}%</span>
    </div>`;
  });
  kpiHtml += `</div></div>`;

  // Movement KPI bar
  kpiHtml += `<div style="background:var(--white);border:1px solid var(--g150);border-radius:8px;padding:12px 16px;margin-bottom:16px">
    <h4 style="font-size:13px;margin:0 0 8px;color:var(--g600)">Account Acceptance Distribution</h4>
    <div style="display:flex;gap:6px;font-size:12px">
      <div style="flex:1;text-align:center;padding:8px;border-radius:6px;background:#34D39918;border:1px solid #34D39930">
        <div style="font-size:18px;font-weight:700;color:#34D399">${fullyAccepted}</div><div style="color:var(--g500);font-size:10px;text-transform:uppercase;font-weight:600">100%</div>
      </div>
      <div style="flex:1;text-align:center;padding:8px;border-radius:6px;background:#FBBF2418;border:1px solid #FBBF2430">
        <div style="font-size:18px;font-weight:700;color:#FBBF24">${highAcceptance}</div><div style="color:var(--g500);font-size:10px;text-transform:uppercase;font-weight:600">75%+</div>
      </div>
      <div style="flex:1;text-align:center;padding:8px;border-radius:6px;background:#F5822018;border:1px solid #F5822030">
        <div style="font-size:18px;font-weight:700;color:#F58220">${midAcceptance}</div><div style="color:var(--g500);font-size:10px;text-transform:uppercase;font-weight:600">25–74%</div>
      </div>
      <div style="flex:1;text-align:center;padding:8px;border-radius:6px;background:#EF444418;border:1px solid #EF444430">
        <div style="font-size:18px;font-weight:700;color:#EF4444">${lowAcceptance}</div><div style="color:var(--g500);font-size:10px;text-transform:uppercase;font-weight:600">1–24%</div>
      </div>
      <div style="flex:1;text-align:center;padding:8px;border-radius:6px;background:var(--g50);border:1px solid var(--g200)">
        <div style="font-size:18px;font-weight:700;color:var(--g400)">${noAcceptance}</div><div style="color:var(--g500);font-size:10px;text-transform:uppercase;font-weight:600">None</div>
      </div>
    </div>
  </div>`;

  // ---- MASTER GRID ----
  const getStatus = (statusId) => statuses.find(s => s.id === statusId);
  const defaultStatus = statuses.find(s => s.label === 'Not Started') || statuses[0];

  // Build the account × product best-status grid
  // For each account+product, show the furthest milestone status
  const angled = rows.length > 6;
  let gridHtml = `<div class="table-wrap" style="max-height:64vh;overflow:auto;border:1px solid var(--g200);border-radius:8px"><table style="width:100%;border-collapse:collapse;font-size:11px">
    <thead style="position:sticky;top:0;z-index:5"><tr>
      <th style="text-align:left;padding:7px 10px;background:var(--g50);border-bottom:1px solid var(--g300);border-right:1px solid var(--g200);font-weight:700;min-width:160px;position:sticky;left:0;z-index:6">Account</th>
      ${rows.map(r => angled ? `<th style="padding:0;background:var(--g50);border-bottom:1px solid var(--g300);border-right:1px solid var(--g200);height:104px;width:32px;min-width:32px;vertical-align:bottom;white-space:nowrap"><div style="transform:translateX(11px) rotate(-45deg);transform-origin:left bottom;width:32px;font-size:10px;font-weight:600;color:var(--g600)">${esc(r.label)}</div></th>` : `<th style="padding:6px 4px;background:var(--g50);border-bottom:1px solid var(--g300);border-right:1px solid var(--g200);font-weight:600;font-size:10px;color:var(--g600);width:84px;min-width:84px;vertical-align:bottom;text-align:center;line-height:1.15">${esc(r.label)}</th>`).join('')}
    </tr></thead>
    <tbody>`;

  acctScores.sort((a,b) => b.mxRate - a.mxRate).forEach(a => {
    const data = state.matrixData[a.id] || [];
    const rateColor = a.mxRate >= 75 ? '#34D399' : a.mxRate >= 40 ? '#FBBF24' : a.mxRate > 0 ? '#F58220' : '#94A3B8';
    const repProfile = (state.profiles||[]).find(p => p.id === a.assigned_to);
    const repName = repProfile?.full_name || '';

    const canEdit = canEditMatrix(a.id);
    gridHtml += `<tr>
      <td onclick="showAccountDetail('${a.id}')" style="padding:4px 10px;border-bottom:1px solid var(--g150);border-right:1px solid var(--g200);position:sticky;left:0;background:var(--white);z-index:1;cursor:pointer">
        <div style="font-weight:600;color:var(--g800);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px">${esc(a.company_name)}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:1px">
          <span style="font-size:12px;font-weight:700;color:${rateColor}">${a.mxRate}%</span>
          ${repName ? `<span style="font-size:9px;color:var(--g400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px">${esc(repName)}</span>` : ''}
        </div>
      </td>`;

    rows.forEach(row => {
      // For each product, find the furthest milestone with a meaningful status
      let bestStatus = defaultStatus;
      cols.forEach(col => {
        const cell = data.find(d => d.row_id === row.id && d.col_id === col.id);
        if (cell) {
          const st = getStatus(cell.status_id);
          if (st && st.label !== 'Not Started') bestStatus = st;
        }
      });
      const color = bestStatus?.color || '#94A3B8';
      const label = bestStatus?.label || 'Not Started';
      const selId = bestStatus?.id || (defaultStatus && defaultStatus.id) || '';
      const shortLabel = label === 'Not Started' ? '—' : label === 'In Progress' ? '●' : label === 'Approved' ? '✓' : label === 'Not Allowed' ? '✗' : label === 'N/A' ? 'N/A' : label.charAt(0);

      if (canEdit) {
        gridHtml += `<td style="padding:0;border-bottom:1px solid var(--g150);border-right:1px solid var(--g150)">
          <select onchange="setMatrixCellFromTable('${a.id}','${row.id}',this.value)" title="${esc(row.label)}: ${esc(label)}" style="width:100%;height:30px;border:none;outline:none;background:${color}1f;color:${color};font-weight:700;font-size:10px;cursor:pointer;text-align:center;text-align-last:center;padding:0 1px">
            ${statuses.map(s => `<option value="${s.id}" ${s.id===selId?'selected':''}>${esc(s.label)}</option>`).join('')}
          </select>
        </td>`;
      } else {
        gridHtml += `<td style="padding:0;border-bottom:1px solid var(--g150);border-right:1px solid var(--g150)">
          <div style="height:30px;display:flex;align-items:center;justify-content:center;background:${color}1f;color:${color};font-weight:700;font-size:12px" title="${esc(row.label)}: ${esc(label)}">${shortLabel}</div>
        </td>`;
      }
    });
    gridHtml += `</tr>`;
  });

  gridHtml += `</tbody></table></div>`;

  el.innerHTML = embedded ? `${kpiHtml}${gridHtml}` : `
    <div class="view-header">
      <h1>Acceptance Matrix ${hasFilter?'<span style="font-size:14px;font-weight:400;color:var(--g400)">— '+accts.length+' of '+allAccounts.length+' accounts</span>':''}</h1>
      <div style="display:flex;gap:8px;align-items:center">
        ${hasFilter ? `<button onclick="clearDashFilters();renderMatrixView()" style="padding:8px 12px;background:var(--danger);color:#fff;border:1px solid var(--danger);border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer">✕ Clear</button>` : ''}
        ${pageSearchBox()}
        ${pagePdfButton()}
      </div>
    </div>
    ${filterHtml}
    ${kpiHtml}
    ${gridHtml}
  `;
}

// ======================== RENDER: DASHBOARD HEATMAP ========================
function renderHeatmapView() {
  const wrapper = document.getElementById('view-heatmap');
  wrapper.innerHTML = `<div class="view-header"><h1>Heatmap</h1><div style="display:flex;gap:8px;align-items:center">${pageSearchBox()}${pagePdfButton()}</div></div><div id="heatmap-filters"></div><div id="heatmap-content"></div>`;
  renderFilters('heatmap-filters');
  renderDashboardHeatmap('heatmap-content');
}

        if (counts[r]) {
          counts[r].total++;
          counts[r]['stage' + a.current_stage]++;
          counts[r].accounts.push(a);

  function heatColor(count, max) {

    'Caboolture':[-27.09,152.95],'Campbelltown':[-34.07,150.81],'Cranbourne':[-38.10,145.28],'Dandenong':[-37.99,145.21],

  };

  function initLeafletMap(containerId, regions, counts, filteredAccounts) {
    if (leafletMap) { leafletMap.remove(); leafletMap = null; }
    const container = document.getElementById(containerId);
    if (!container) return;

    const hasAU = regions.some(r => AU_REGIONS.includes(r));
    const hasNZ = regions.some(r => NZ_REGIONS.includes(r));
    let center, zoom;
    if (hasAU && hasNZ) { center = [-34, 152]; zoom = 4; }
    else if (hasAU) { center = [-30, 135]; zoom = 5; }
    else { center = [-41, 174]; zoom = 6; }

    leafletMap = L.map(containerId, { scrollWheelZoom: false, zoomControl: true, attributionControl: false, background: '#dce9f5' }).setView(center, zoom);
    leafletMap.getContainer().style.background = '#dce9f5';
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
      maxZoom: 12, minZoom: 3
    }).addTo(leafletMap);

    const maxCount = Math.max(...Object.values(counts).map(c => c.total), 1);
    const stageColors = ['','#94A3B8','#38BDF8','#34D399','#FBBF24','#F58220'];
    const stageNames = ['','Identify','Engage','Demonstrate','Convert','Grow & Retain'];

    // Map region codes to GeoJSON property names
    const AU_CODE_MAP = {NSW:'New South Wales',VIC:'Victoria',QLD:'Queensland',WA:'Western Australia',SA:'South Australia',TAS:'Tasmania',ACT:'Australian Capital Territory',NT:'Northern Territory'};
    const NZ_CODE_MAP = {NTL:'Northland',AKL:'Auckland',WKO:'Waikato',BOP:'Bay of Plenty',GIS:'Gisborne',HKB:"Hawke's Bay",TKI:'Taranaki',MWT:'Manawatu-Wanganui',WGN:'Wellington',TSM:'Tasman',NSN:'Nelson',MBH:'Marlborough',WTC:'West Coast',CAN:'Canterbury',OTA:'Otago',STL:'Southland'};

    function choroplethColor(count) {
      if (count === 0) return '#f5f5f5';
      const t = Math.min(count / Math.max(maxCount, 1), 1);
      // 5-step orange gradient
      if (t <= 0.2) return '#FEF3C7';
      if (t <= 0.4) return '#FDE68A';
      if (t <= 0.6) return '#FDBA74';
      if (t <= 0.8) return '#FB923C';
      return '#F58220';
    }

    // Load and render GeoJSON boundaries
    async function loadGeoJSON() {
      const geoLayers = [];

      if (hasAU) {
        try {
          const auGeo = await fetch('https://raw.githubusercontent.com/rowanhogan/australian-states/master/states.geojson').then(r => r.json());
          const auLayer = L.geoJSON(auGeo, {
            style: feature => {
              return { fillColor: '#f5f5f5', fillOpacity: 0.4, color: '#ccc', weight: 1.5, opacity: 1 };
            },
            onEachFeature: (feature, layer) => {
              const name = feature.properties.STATE_NAME || feature.properties.name || '';
              const code = Object.entries(AU_CODE_MAP).find(([k,v]) => v === name || name.includes(v));
              const regionCode = code ? code[0] : null;
              const c = regionCode && counts[regionCode] ? counts[regionCode] : {total:0,stage1:0,stage2:0,stage3:0,stage4:0,stage5:0};
              let popup = `<div class="map-popup-title">${REGION_NAMES[regionCode]||name}</div>`;
              popup += `<div class="map-popup-stat"><strong>Total</strong><strong>${c.total}</strong></div>`;
              for (let s = 1; s <= 5; s++) {
                if (c['stage'+s]) popup += `<div class="map-popup-stat"><span><span class="map-popup-dot" style="background:${stageColors[s]}"></span>${stageNames[s]}</span><span>${c['stage'+s]}</span></div>`;
              }
              layer.bindPopup(popup, { maxWidth: 220 });
              if (regionCode) layer.on('click', () => { setFilter('region', regionCode); showView('accounts'); });
            }
          }).addTo(leafletMap);
          geoLayers.push(auLayer);
        } catch(e) { console.warn('AU GeoJSON failed', e); }
      }

      if (hasNZ) {
        const NZ_NAME_MAP = {'Northland':'NTL','Auckland':'AKL','Waikato':'WKO','Bay of Plenty':'BOP',
          'Gisborne District':'GIS','Gisborne':'GIS',"Hawke's Bay":'HKB','Taranaki':'TKI',
          'Manawatu-Wanganui':'MWT','Manawatū-Whanganui':'MWT','Wellington':'WGN',
          'Tasman District':'TSM','Tasman':'TSM','Nelson City':'NSN','Nelson':'NSN',
          'Marlborough District':'MBH','Marlborough':'MBH','West Coast':'WTC',
          'Canterbury':'CAN','Otago':'OTA','Southland':'STL'};
        try {
          const neResp = await fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_admin_1_states_provinces.geojson');
          const neJson = await neResp.json();
          const nzFeatures = neJson.features.filter(f => f.properties.iso_a2 === 'NZ' && NZ_NAME_MAP[f.properties.name]);
          const nzGeo = { type: 'FeatureCollection', features: nzFeatures };
          const nzLayer = L.geoJSON(nzGeo, {
            style: feature => {
              return { fillColor: '#f5f5f5', fillOpacity: 0.4, color: '#ccc', weight: 1.5, opacity: 1 };
            },
            onEachFeature: (feature, layer) => {
              const code = NZ_NAME_MAP[feature.properties.name];
              const c = code && counts[code] ? counts[code] : {total:0,stage1:0,stage2:0,stage3:0,stage4:0,stage5:0};
              let popup = `<div class="map-popup-title">${REGION_NAMES[code]||feature.properties.name}</div>`;
              popup += `<div class="map-popup-stat"><strong>Total</strong><strong>${c.total}</strong></div>`;
              for (let s = 1; s <= 5; s++) {
                if (c['stage'+s]) popup += `<div class="map-popup-stat"><span><span class="map-popup-dot" style="background:${stageColors[s]}"></span>${stageNames[s]}</span><span>${c['stage'+s]}</span></div>`;
              }
              layer.bindPopup(popup, { maxWidth: 220 });
              if (code) layer.on('click', () => { setFilter('region', code); showView('accounts'); });
            }
          }).addTo(leafletMap);
          geoLayers.push(nzLayer);
        } catch(e) { console.warn('NZ GeoJSON failed', e); }
      }

      // Add account pin dots
      const pinGroup = L.featureGroup().addTo(leafletMap);
      filteredAccounts.forEach(a => {
        const city = a.hq_city ? a.hq_city.trim() : '';
        let coord = CITY_COORDS[city];
        if (!coord) {
          // Fall back to region centroid with jitter
          const regs = (a.regions||'').split(',').map(s=>s.trim()).filter(Boolean);
          const reg = regs[0];
          coord = reg && MAP_CENTROIDS[reg] ? [MAP_CENTROIDS[reg][0] + (Math.random()-0.5)*1.5, MAP_CENTROIDS[reg][1] + (Math.random()-0.5)*1.5] : null;
        }
        if (!coord) return;
        const sColor = stageColors[a.current_stage] || '#94A3B8';
        const stalled = isStalled(a);
        const pin = L.circleMarker(coord, {
          radius: 6, fillColor: stalled ? '#ef4444' : sColor, color: '#fff', weight: 1.6, fillOpacity: 0.9
        }).addTo(pinGroup);
        const comp = getStageCompletion(a.id, a.current_stage);
        pin.bindPopup(`<div class="map-popup-title">${a.company_name}</div>
          <div class="map-popup-stat"><span>Stage</span><span><span class="map-popup-dot" style="background:${sColor}"></span>${STAGES[a.current_stage].name}</span></div>
          <div class="map-popup-stat"><span>Progress</span><span>${comp.done}/${comp.total}</span></div>
          ${stalled ? `<div class="map-popup-stat"><span>Status</span><span style="color:#ef4444;font-weight:700">⚠ Stalled</span></div>` : ''}
          ${a.hq_city ? `<div class="map-popup-stat"><span>City</span><span>${a.hq_city}</span></div>` : ''}`, { maxWidth: 220 });
        pin.bindTooltip(a.company_name, { direction: 'top', offset: [0, -6], className: 'map-tip' });
        pin.on('click', () => showAccountDetail(a.id));
      });

      // Fit map tightly to pins (dots), fall back to geo boundaries only if no pins
      const hasPins = pinGroup.getLayers().length > 0;
      const boundsGroup = L.featureGroup();
      if (hasPins) {
        boundsGroup.addLayer(pinGroup);
      } else {
        geoLayers.forEach(l => boundsGroup.addLayer(l));
      }
      const doFit = () => {
        if (!leafletMap || !boundsGroup.getLayers().length) return;
        try {
          leafletMap.invalidateSize();
          const b = boundsGroup.getBounds();
          if (b && b.isValid()) {
            leafletMap.fitBounds(b, { padding: [2, 2], maxZoom: 11, animate: false });
          }
        } catch(e) {}
      };
      doFit();
      requestAnimationFrame(doFit);
      setTimeout(doFit, 200);
      setTimeout(doFit, 600);
      setTimeout(doFit, 1200);
    }

    loadGeoJSON();
    setTimeout(() => { if (leafletMap) leafletMap.invalidateSize(); }, 150);
    setTimeout(() => { if (leafletMap) leafletMap.invalidateSize(); }, 500);
    setTimeout(() => { if (leafletMap) leafletMap.invalidateSize(); }, 1000);
  }

  // Rep coverage map
  const repMap = {};
  accounts.forEach(a => {
    const rep = getRepName(a.assigned_to) || 'Unassigned';
    if (!repMap[rep]) repMap[rep] = { regions: new Set(), count: 0, stages: {}, stalled: 0 };
    repMap[rep].count++;
    if (isStalled(a)) repMap[rep].stalled++;
    const acctRegions = (a.regions || '').split(',').map(s => s.trim()).filter(Boolean);
    acctRegions.forEach(r => repMap[rep].regions.add(r));
    repMap[rep].stages[a.current_stage] = (repMap[rep].stages[a.current_stage] || 0) + 1;
  });

  let repHtml = '';
  if (Object.keys(repMap).length) {
    if (!state.repSortCol) state.repSortCol = 'name';
    if (!state.repSortDir) state.repSortDir = 'asc';
    const rsc = state.repSortCol, rsd = state.repSortDir === 'asc' ? 1 : -1;
    const repEntries = Object.entries(repMap).map(([name, data]) => {
      const avgStage = Object.entries(data.stages).reduce((sum, [s, c]) => sum + parseInt(s) * c, 0) / data.count;
      return { name, ...data, avgStage };
    });
    repEntries.sort((a, b) => {
      if (rsc === 'name') return rsd * a.name.localeCompare(b.name);
      if (rsc === 'accts') return rsd * (a.count - b.count);
      if (rsc === 'stage') return rsd * (a.avgStage - b.avgStage);
      return 0;
    });
    const rsIcon = (col) => { if (rsc !== col) return ' ↕'; return rsd > 0 ? ' ↑' : ' ↓'; };
    const rsActive = (col) => rsc === col ? ';color:var(--vic-orange)' : '';
    const stColors = ['#94A3B8','#38BDF8','#34D399','#FBBF24','#F58220'];
    repHtml = `<div class="dash-section">
      <h3 style="margin:0 0 8px;font-size:12px">Rep Coverage</h3>
      <div class="table-wrap"><table class="data-table">
        <thead><tr>
          <th style="cursor:pointer${rsActive('name')}" onclick="state.repSortCol=state.repSortCol==='name'?'name':'name';state.repSortDir=state.repSortCol==='name'&&state.repSortDir==='asc'?'desc':'asc';state.repSortCol='name';renderDashboardHeatmap('${el.id}')">Rep${rsIcon('name')}</th>
          <th style="cursor:pointer${rsActive('accts')}" onclick="state.repSortDir=state.repSortCol==='accts'&&state.repSortDir==='asc'?'desc':'asc';state.repSortCol='accts';renderDashboardHeatmap('${el.id}')">Accounts${rsIcon('accts')}</th>
          <th>Regions</th>
          ${[1,2,3,4,5].map(s => `<th style="text-align:center;padding:8px 5px" title="${STAGES[s].name}"><span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${stColors[s-1]}"></span></th>`).join('')}
          <th style="text-align:center;padding:8px 5px" title="Stalled"><span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:#ef4444"></span></th>
        </tr></thead>
        <tbody>${repEntries.map(r => {
          return `<tr>
            <td><strong>${esc(r.name)}</strong></td>
            <td>${r.count}</td>
            <td style="font-size:12px">${[...r.regions].join(', ') || '—'}</td>
            ${[1,2,3,4,5].map(s => `<td style="text-align:center;font-size:13px;font-weight:600;color:${(r.stages[s]||0) > 0 ? stColors[s-1] : 'var(--g300)'}">${r.stages[s] || 0}</td>`).join('')}
            <td style="text-align:center;font-size:13px;font-weight:700;color:${(r.stalled||0) > 0 ? '#ef4444' : 'var(--g300)'}">${r.stalled || 0}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
  }

  // Unassigned accounts warning
  const unassigned = accounts.filter(a => !a.regions || a.regions.trim() === '');
  let unassignedHtml = '';
  if (unassigned.length) {
    unassignedHtml = `<div class="dash-section">
      <h3 style="color:var(--danger)">No Region Assigned (${unassigned.length})</h3>
      <ul class="weakness-list">${unassigned.map(a => `
        <li class="weakness-item" onclick="showAccountDetail('${a.id}')" style="cursor:pointer">
          <span class="weakness-dot amber"></span>
          <span style="flex:1"><strong>${esc(a.company_name)}</strong></span>
          <span class="badge badge-${a.country.toLowerCase()}">${a.country}</span>
        </li>`).join('')}
      </ul>
    </div>`;
  }

  // Determine which countries to show based on filters and actual account data
  const auSel = state.dashFilterCountry.includes('AU');
  const nzSel = state.dashFilterCountry.includes('NZ');
  const hasFilteredAU = accounts.some(a => a.country === 'AU');
  const hasFilteredNZ = accounts.some(a => a.country === 'NZ');
  const hasActiveFilter = state.dashFilterRep.length > 0 || state.dashFilterManager.length > 0;
  const mapShowAU = auSel ? true : nzSel ? false : hasActiveFilter ? hasFilteredAU : showAU;
  const mapShowNZ = nzSel ? true : auSel ? false : hasActiveFilter ? hasFilteredNZ : showNZ;

  el.innerHTML = `
    <div class="dash-section">
      <h3>Account Locations</h3>
      <div id="leaflet-heatmap" class="leaflet-map-container"></div>
      <div style="display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 0 4px">
        <span style="display:flex;align-items:center;gap:4.8px;font-size:13.2px;color:var(--g500)"><span style="width:9.6px;height:9.6px;border-radius:50%;background:#94A3B8"></span>Identify</span>
        <span style="display:flex;align-items:center;gap:4.8px;font-size:13.2px;color:var(--g500)"><span style="width:9.6px;height:9.6px;border-radius:50%;background:#38BDF8"></span>Engage</span>
        <span style="display:flex;align-items:center;gap:4.8px;font-size:13.2px;color:var(--g500)"><span style="width:9.6px;height:9.6px;border-radius:50%;background:#34D399"></span>Demonstrate</span>
        <span style="display:flex;align-items:center;gap:4.8px;font-size:13.2px;color:var(--g500)"><span style="width:9.6px;height:9.6px;border-radius:50%;background:#FBBF24"></span>Convert</span>
        <span style="display:flex;align-items:center;gap:4.8px;font-size:13.2px;color:var(--g500)"><span style="width:9.6px;height:9.6px;border-radius:50%;background:#F58220"></span>Grow</span>
        <span style="display:flex;align-items:center;gap:4.8px;font-size:13.2px;color:var(--g500)"><span style="width:9.6px;height:9.6px;border-radius:50%;background:#ef4444"></span>Stalled</span>
      </div>
    </div>
    ${repHtml}
    ${unassignedHtml}
  `;

  // Initialize Leaflet map after DOM is ready
  const mapRegions = [];
  const allCounts = {};
  if (mapShowAU) { auStates.forEach(r => { mapRegions.push(r); allCounts[r] = auCounts[r]; }); }
  if (mapShowNZ) { nzRegions.forEach(r => { mapRegions.push(r); allCounts[r] = nzCounts[r]; }); }
  setTimeout(() => initLeafletMap('leaflet-heatmap', mapRegions, allCounts, accounts), 50);
}

function renderTeamView() {
  const el = document.getElementById('view-team');
  const profiles = state.profiles || [];

  // Build hierarchy from reports_to field
  const managers = profiles.filter(p => p.role === 'manager' || p.role === 'admin' || p.role === 'director');
  const reps = profiles.filter(p => p.role === 'rep');

  // Find the top-level manager (divisional - no reports_to, or reports_to is null among managers)
  const topManager = managers.find(m => !m.reports_to || !managers.some(mm => mm.id === m.reports_to)) || managers[0];
  const midManagers = managers.filter(m => m.id !== topManager?.id);

  const sortByFirstName = (a, b) => (a.full_name || '').localeCompare(b.full_name || '');
  reps.sort(sortByFirstName);
  midManagers.sort(sortByFirstName);

  let html = '<div class="view-header"><h1>Teams</h1></div>';
  html += '<div style="padding:0 16px">';

  if (profiles.length === 0) {
    html += '<div class="profile-card"><p style="color:var(--g500)">No team members found. Users will appear here once accounts are created.</p></div>';
    html += '</div>';
    el.innerHTML = html;
    return;
  }

  // Top manager card
  if (topManager) {
    html += `<div class="profile-card" style="border-left:4px solid #1a1a1a;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px">${(topManager.full_name||'?')[0]}</div>
        <div>
          <div style="font-weight:700;font-size:15px">${esc(topManager.full_name)}</div>
          <div style="font-size:12px;color:var(--g500)">Divisional Manager</div>
          ${topManager.region ? '<div style="font-size:11px;color:var(--g400)">'+esc(topManager.region)+'</div>' : ''}
        </div>
      </div>
    </div>`;
  }

  // Mid-level managers with their reps
  // Managers who report to another mid-manager show as team members, not as their own card
  const hasOwnCard = new Set();
  const topId = topManager?.id;
  midManagers.forEach(m => {
    if (!m.reports_to || m.reports_to === topId) hasOwnCard.add(m.id);
  });
  const managersToShow = midManagers.filter(m => hasOwnCard.has(m.id));
  managersToShow.sort(sortByFirstName);

  managersToShow.forEach(mgr => {
    const mgrReps = [...reps.filter(r => r.reports_to === mgr.id), ...midManagers.filter(m => m.reports_to === mgr.id && !hasOwnCard.has(m.id))];
    mgrReps.sort(sortByFirstName);

    html += `<div class="profile-card" style="border-left:4px solid var(--vic-orange);margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:${mgrReps.length ? '12' : '0'}px">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--vic-orange);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px">${(mgr.full_name||'?')[0]}</div>
        <div>
          <div style="font-weight:700;font-size:14px">${esc(mgr.full_name)}</div>
          <div style="font-size:12px;color:var(--g500)">Regional Manager</div>
          ${mgr.region ? '<div style="font-size:11px;color:var(--g400)">'+esc(mgr.region)+'</div>' : ''}
        </div>
      </div>`;

    if (mgrReps.length) {
      html += '<div style="margin-left:24px;border-left:2px solid var(--g200);padding-left:16px">';
      mgrReps.forEach(rep => {
        const repAccounts = (state.accounts || []).filter(a => a.assigned_to === rep.id).length;
        html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g100)">
          <div style="width:30px;height:30px;border-radius:50%;background:var(--g200);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:var(--g600)">${(rep.full_name||'?')[0]}</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">${esc(rep.full_name)}</div>
            ${rep.region ? '<span style="font-size:11px;color:var(--g400)">'+esc(rep.region)+'</span>' : ''}
          </div>
          <div style="font-size:12px;color:var(--g500)">${repAccounts} account${repAccounts!==1?'s':''}</div>
        </div>`;
      });
      html += '</div>';
    }

    html += '</div>';
  });

  // Unassigned reps (no reports_to set)
  const unassignedReps = reps.filter(r => !r.reports_to || !managers.some(m => m.id === r.reports_to));
  if (unassignedReps.length && midManagers.length > 0) {
    html += '<div class="profile-card" style="border-left:4px solid var(--g300);margin-bottom:16px">';
    html += '<div style="font-weight:700;font-size:14px;margin-bottom:12px;color:var(--g500)">Unassigned Reps</div>';
    html += '<div style="margin-left:24px;border-left:2px solid var(--g200);padding-left:16px">';
    unassignedReps.forEach(rep => {
      const repAccounts = (state.accounts || []).filter(a => a.assigned_to === rep.id).length;
      html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g100)">
        <div style="width:30px;height:30px;border-radius:50%;background:var(--g200);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:var(--g600)">${(rep.full_name||'?')[0]}</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px">${esc(rep.full_name)}</div>
          ${rep.region ? '<span style="font-size:11px;color:var(--g400)">'+esc(rep.region)+'</span>' : ''}
        </div>
        <div style="font-size:12px;color:var(--g500)">${repAccounts} account${repAccounts!==1?'s':''}</div>
      </div>`;
    });
    html += '</div></div>';
  }

  html += '</div>';
  el.innerHTML = html;
}

let adminSort = { col: 'name', dir: 'asc' };
function sortAdminCol(col) {
  if (adminSort.col === col) adminSort.dir = adminSort.dir === 'asc' ? 'desc' : 'asc';
  else { adminSort.col = col; adminSort.dir = 'asc'; }
  renderAdminPanel();
}

function renderAdminPanel() {

    return;
  }

  const allProfiles = (state.profiles || []);
  const sortFn = (a, b) => {
    let va, vb;
    switch (adminSort.col) {
      case 'name': va = a.full_name||''; vb = b.full_name||''; break;
      case 'role': va = a.role||''; vb = b.role||''; break;
      case 'country': va = a.country||''; vb = b.country||''; break;
      case 'reports_to':
        va = (allProfiles.find(m=>m.id===a.reports_to)?.full_name)||'';
        vb = (allProfiles.find(m=>m.id===b.reports_to)?.full_name)||'';
        break;
      case 'admin': va = a.role==='director'?'0':a.role==='admin'?'1':'2'; vb = b.role==='director'?'0':b.role==='admin'?'1':'2'; break;
      case 'status': va = a.locked?'1':'0'; vb = b.locked?'1':'0'; break;
      default: va = a.full_name||''; vb = b.full_name||'';

    return adminSort.dir === 'asc' ? cmp : -cmp;

// Org role is rep or manager; admin is layered on top via role='admin' + _orgRole
function getOrgRole(p) {
  if (p.role === 'admin' || p.role === 'director') return p._orgRole || p.role;
  return p.role;
}

async function adminUpdateRole(userId, newRole) {
  try {
    const p = state.profiles.find(pr => pr.id === userId);
    if (!p) return;
    if (p.role === 'admin') {
      // Keep admin, just remember the org role
      p._orgRole = newRole;
      toast('Role updated');
      renderAdminPanel();
    } else {
      await supa.from('profiles').update({ role: newRole }).eq('id', userId);
      p.role = newRole;
      toast('Role updated');
      renderAdminPanel();
    }
  } catch (e) { toast('Error: ' + e.message); }
}

async function adminToggleAdmin(userId, val) {
  const p = state.profiles.find(pr => pr.id === userId);
  if (!p) return;
  if (val === 'admin' || val === 'director') {
    if (p.role !== 'admin' && p.role !== 'director') p._orgRole = p.role;
    try {
      await supa.from('profiles').update({ role: val }).eq('id', userId);
      p.role = val;
      toast(val === 'director' ? 'Director role set' : 'Admin granted');
      renderAdminPanel();
    } catch (e) { toast('Error: ' + e.message); }
  } else {
    const restoreRole = p._orgRole || 'rep';
    try {
      await supa.from('profiles').update({ role: restoreRole }).eq('id', userId);
      p.role = restoreRole;
      delete p._orgRole;
      toast('Role restored to ' + restoreRole);
      renderAdminPanel();
    } catch (e) { toast('Error: ' + e.message); }
  }
}

async function adminToggleLock(userId, lock) {

function showReassignModal({ title, intro, optionsHtml, listHtml, confirmLabel, onConfirm }) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
  overlay.innerHTML = `<div style="background:#fff;border-radius:10px;max-width:560px;width:100%;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.25)">
    <div style="padding:18px 20px 12px">
      <h3 style="margin:0 0 6px;font-size:16px;color:var(--g700)">${title}</h3>
      <p style="margin:0 0 12px;font-size:13px;color:var(--g500);line-height:1.45">${intro}</p>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:13px;font-weight:600;color:var(--g700);white-space:nowrap">Reassign all to:</span>
        <select id="reassign-target" style="flex:1;padding:7px 8px;border:1px solid var(--g300);border-radius:6px;font-size:13px">${optionsHtml}</select>
      </div>
    </div>
    <div style="overflow:auto;padding:8px 20px;border-top:1px solid var(--g150);background:var(--g50)">${listHtml}</div>
    <div style="padding:14px 20px;display:flex;gap:8px;justify-content:flex-end">
      <button id="reassign-cancel" style="padding:8px 16px;border:1px solid var(--g300);background:#fff;border-radius:6px;font-size:13px;cursor:pointer;color:var(--g600)">Cancel</button>
      <button id="reassign-confirm" style="padding:8px 16px;border:none;background:var(--vic-orange);color:#fff;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">${confirmLabel}</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#reassign-cancel').onclick = close;
  overlay.querySelector('#reassign-confirm').onclick = async () => {
    const target = overlay.querySelector('#reassign-target').value;
    const btn = overlay.querySelector('#reassign-confirm');
    btn.disabled = true; btn.textContent = 'Working…';
    try { await onConfirm(target); close(); }
    catch (e) { toast('Error: ' + e.message); btn.disabled = false; btn.textContent = confirmLabel; }
  };
}

async function adminDeleteUser(userId, event) {
  if (userId === state.profile?.id) { toast('Cannot delete yourself'); return; }
  const name = getRepName(userId);
  const accts = state.accounts.filter(a => a.assigned_to === userId);
  if (!accts.length) {
    showPopup({ title:'Delete User', message:`Permanently delete <strong>${esc(name)}</strong>? This cannot be undone.`, confirmLabel:'Delete', danger:true,
      onConfirm: async () => { try { await reallyDeleteUser(userId, name); } catch(e){ toast('Error: '+e.message); } } }, event);
    return;
  }
  const others = state.profiles.filter(p => p.id !== userId);
  if (!others.length) { toast('No other user to reassign accounts to'); return; }
  const optionsHtml = others.map(p => `<option value="${p.id}">${esc(p.full_name||'—')}</option>`).join('');
  const rows = accts.map(a => [esc(a.company_name), `${fxSymbol()}${formatNumber(Math.round(toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency)))}`]);
  showReassignModal({
    title: `Delete ${esc(name)}`,
    intro: `<strong>${esc(name)}</strong> has <strong>${accts.length}</strong> account${accts.length!==1?'s':''} assigned. Pick who inherits them, then ${esc(name)} is deleted.`,
    optionsHtml,
    listHtml: reassignTableHtml(['Account','Opportunity'], rows),
    confirmLabel: 'Reassign & Delete',
    onConfirm: async (targetId) => {
      const { error } = await supa.from('kac_accounts').update({ assigned_to: targetId, updated_at: new Date().toISOString() }).eq('assigned_to', userId);
      if (error) throw error;
      state.accounts.forEach(a => { if (a.assigned_to === userId) a.assigned_to = targetId; });
      await reallyDeleteUser(userId, name);
    }
  });
}
async function reallyDeleteUser(userId, name) {
  const { error } = await supa.from('profiles').delete().eq('id', userId);
  if (error) throw error;
  state.profiles = state.profiles.filter(p => p.id !== userId);
  toast(`${name} deleted`);
  renderAdminPanel();
}

async function addMatrixItem(type, inputId) {
  const input = document.getElementById(inputId);
  const label = input?.value?.trim();
  if (!label) return;
  const configType = type === 'status' ? 'status' : type;
  const arr = type === 'row' ? state.matrixConfig.rows : type === 'col' ? state.matrixConfig.cols : state.matrixConfig.statuses;
  const sortOrder = arr.length;
  try {
    const { data, error } = await supa.from('kac_matrix_config').insert({ config_type: configType, label, sort_order: sortOrder }).select().single();
    if (error) throw error;
    arr.push(data);
    input.value = '';
    renderAdminPanel();
    toast(`Added "${label}"`);
  } catch (e) { toast('Error: ' + e.message); }
}

async function addMatrixStatus() {
  const input = document.getElementById('matrix-new-status');
  const colorInput = document.getElementById('matrix-new-status-color');
  const label = input?.value?.trim();
  if (!label) return;
  const color = colorInput?.value || '#94A3B8';
  const sortOrder = state.matrixConfig.statuses.length;
  try {
    const { data, error } = await supa.from('kac_matrix_config').insert({ config_type: 'status', label, color, sort_order: sortOrder }).select().single();
    if (error) throw error;
    state.matrixConfig.statuses.push(data);
    input.value = '';
    renderAdminPanel();

  } catch (e) { toast('Error: ' + e.message); }
}

function deleteMatrixItem(id, type, event) {
  const arr = type === 'row' ? state.matrixConfig.rows : type === 'col' ? state.matrixConfig.cols : state.matrixConfig.statuses;
  const item = arr.find(r => r.id === id);
  if (!item) return;
  const field = type === 'row' ? 'row_id' : type === 'col' ? 'col_id' : 'status_id';
  const perAcct = [];
  let usage = 0;
  Object.entries(state.matrixData).forEach(([acctId, cells]) => {
    const n = cells.filter(c => c[field] === id).length;
    if (n) { usage += n; const a = state.accounts.find(x => x.id === acctId); perAcct.push([esc(a ? a.company_name : '(unknown)'), `${n} cell${n!==1?'s':''}`]); }
  });
  if (!usage) {
    showPopup({ title:'Delete Item', message:`Delete "<strong>${esc(item.label)}</strong>"?`, confirmLabel:'Delete', danger:true,
      onConfirm: async () => { try { await reallyDeleteMatrixItem(id, arr); } catch(e){ toast('Error: '+e.message); } } }, event);
    return;
  }
  const others = arr.filter(x => x.id !== id);
  if (!others.length) { toast('Add another item to reassign the data to first'); return; }
  const noun = type === 'row' ? 'product' : type === 'col' ? 'milestone' : 'status';
  const optionsHtml = others.map(x => `<option value="${x.id}">${esc(x.label)}</option>`).join('');
  const overwriteNote = type === 'status' ? '' : ` (overwrites the chosen ${noun}'s existing cells)`;
  showReassignModal({
    title: `Delete ${noun}: ${esc(item.label)}`,
    intro: `<strong>${esc(item.label)}</strong> holds <strong>${usage}</strong> cell${usage!==1?'s':''} across <strong>${perAcct.length}</strong> account${perAcct.length!==1?'s':''}. Move that data to another ${noun}${overwriteNote}, then delete.`,
    optionsHtml,
    listHtml: reassignTableHtml(['Account','Data'], perAcct),
    confirmLabel: 'Reassign & Delete',
    onConfirm: async (targetId) => { await reassignMatrixRefAndDelete(id, type, field, targetId, arr); }
  });
}
async function reassignMatrixRefAndDelete(id, type, field, targetId, arr) {
  // For row/col the target already has its own cells per account, so clear them first
  // (overwrite), then re-point the deleted item's cells onto the target.
  if (type !== 'status') {
    const { error: e1 } = await supa.from('kac_matrix_data').delete().eq(field, targetId);
    if (e1) throw e1;
  }
  const { error: e2 } = await supa.from('kac_matrix_data').update({ [field]: targetId, updated_at: new Date().toISOString() }).eq(field, id);
  if (e2) throw e2;
  const { error: e3 } = await supa.from('kac_matrix_config').delete().eq('id', id);
  if (e3) throw e3;
  Object.values(state.matrixData).forEach(cells => {
    if (type !== 'status') for (let i = cells.length - 1; i >= 0; i--) if (cells[i][field] === targetId) cells.splice(i, 1);
    cells.forEach(c => { if (c[field] === id) c[field] = targetId; });
  });
  const idx = arr.findIndex(x => x.id === id); if (idx >= 0) arr.splice(idx, 1);
  renderAdminPanel();
  toast('Reassigned & deleted');
}
async function reallyDeleteMatrixItem(id, arr) {
  const { error } = await supa.from('kac_matrix_config').delete().eq('id', id);
  if (error) throw error;
  const idx = arr.findIndex(r => r.id === id); if (idx >= 0) arr.splice(idx, 1);
  renderAdminPanel();

}

async function moveMatrixItem(id, type, currentIdx, direction) {

async function addSectorItem() {

  try {

    state.sectorConfig.push(data);
    input.value = '';
    renderAdminPanel();
    toast(`Added "${label}"`);
  } catch (e) { toast('Error: ' + e.message); }
}

function deleteSectorItem(id, event) {
  const item = state.sectorConfig.find(s => s.id === id);
  if (!item) return;
  const label = item.label;
  const affected = state.accounts.filter(a => (a.key_sectors||'').split(',').map(s=>s.trim()).includes(label));
  if (!affected.length) {
    showPopup({ title:'Delete Sector', message:`Delete "<strong>${esc(label)}</strong>"?`, confirmLabel:'Delete', danger:true,
      onConfirm: async () => { try { await reallyDeleteSector(id); } catch(e){ toast('Error: '+e.message); } } }, event);
    return;
  }
  const others = state.sectorConfig.filter(s => s.id !== id);
  const optionsHtml = others.map(s => `<option value="${esc(s.label)}">${esc(s.label)}</option>`).join('') + `<option value="__REMOVE__">— Remove the tag —</option>`;
  const rows = affected.map(a => [esc(a.company_name), esc(a.key_sectors||'')]);
  showReassignModal({
    title: `Delete sector: ${esc(label)}`,
    intro: `<strong>${affected.length}</strong> account${affected.length!==1?'s':''} use "${esc(label)}". Reassign them to another sector (or remove the tag), then delete.`,
    optionsHtml,
    listHtml: reassignTableHtml(['Account','Current sectors'], rows),
    confirmLabel: 'Reassign & Delete',
    onConfirm: async (target) => { await reassignSectorAndDelete(id, label, target, affected); }
  });
}
async function reassignSectorAndDelete(id, oldLabel, target, affected) {
  for (const a of affected) {
    let secs = (a.key_sectors||'').split(',').map(s=>s.trim()).filter(Boolean).filter(s => s !== oldLabel);
    if (target !== '__REMOVE__' && !secs.includes(target)) secs.push(target);
    secs.sort();
    const newVal = secs.join(', ');
    const { error } = await supa.from('kac_accounts').update({ key_sectors: newVal, updated_at: new Date().toISOString() }).eq('id', a.id);
    if (error) throw error;
    a.key_sectors = newVal;
  }
  await reallyDeleteSector(id);
}
async function reallyDeleteSector(id) {
  const { error } = await supa.from('kac_sectors').delete().eq('id', id);
  if (error) throw error;
  const idx = state.sectorConfig.findIndex(s => s.id === id); if (idx >= 0) state.sectorConfig.splice(idx, 1);
  renderAdminPanel();
  toast('Deleted');
}

  try {
    await Promise.all([
      supa.from('kac_sectors').update({ sort_order: currentIdx }).eq('id', arr[currentIdx].id),
      supa.from('kac_sectors').update({ sort_order: newIdx }).eq('id', arr[newIdx].id)
    ]);
    arr[currentIdx].sort_order = currentIdx;
    arr[newIdx].sort_order = newIdx;
    renderAdminPanel();
  } catch (e) { toast('Error: ' + e.message); }
}

async function handleChangeCountry(val) {
  try {
    await supa.from('profiles').update({ country: val }).eq('id', state.user.id);
    state.profile.country = val;
    toast('Country updated');
    // Re-render profile to update region options
    showView('profile');
  } catch (e) { toast('Error: ' + e.message); }
}

async function toggleProfileRegion(region) {
  const current = (state.profile.region || '').split(',').map(s=>s.trim()).filter(Boolean);
  const idx = current.indexOf(region);
  if (idx >= 0) current.splice(idx, 1);
  else current.push(region);
  const newVal = current.join(', ');
  try {
    const { error } = await supa.from('profiles').update({ region: newVal }).eq('id', state.user.id);
    if (error) throw error;
    state.profile.region = newVal;
    renderProfile();
    toast(idx >= 0 ? `Removed ${region}` : `Added ${region}`);
  } catch (err) {
    toast('Error: ' + err.message);
  }
}

async function handleChangePassword() {
  const pw = document.getElementById('pw-new').value;
  const confirm = document.getElementById('pw-confirm').value;
  if (!pw || pw.length < 8) { toast('Password must be at least 8 characters'); return; }
  if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw)) { toast('Password must contain at least one special character'); return; }
  if (pw !== confirm) { toast('Passwords do not match'); return; }
  try {
    const { error } = await supabase.auth.updateUser({ password: pw });
    if (error) throw error;
    document.getElementById('pw-new').value = '';
    document.getElementById('pw-confirm').value = '';
    toast('Password updated successfully');
  } catch (err) {
    toast('Error: ' + err.message);
  }
}

function exportData() {
  const data = {
    exported_at: new Date().toISOString(),
    accounts: state.accounts,
    checklist: state.checklist,
    contacts: state.contacts,
    notes: state.notes
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kac_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup exported');
}

// ======================== PDF REPORT ========================
function generatePDFReport() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const isManager = state.profile?.role === 'manager' || state.profile?.role === 'admin' || state.profile?.role === 'director';
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 14;
  const VIC_ORANGE = [245, 130, 32];
  const VIC_BLACK = [26, 26, 26];
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });

  function addHeader(title) {
    // Orange top band
    doc.setFillColor(...VIC_ORANGE);
    doc.rect(0, 0, pageW, 18, 'F');
    // Black band below
    doc.setFillColor(...VIC_BLACK);
    doc.rect(0, 18, pageW, 10, 'F');
    // Title in orange band
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text('VICTAULIC', margin, 12);
    doc.setFontSize(10);
    doc.text('KEY ACCOUNT CONVERSION', margin + 52, 12);
    // Subtitle in black band
    doc.setFontSize(9);
    doc.text(title.toUpperCase(), margin, 25);
    doc.text(dateStr, pageW - margin, 25, { align: 'right' });
    doc.setTextColor(0, 0, 0);
    return 34;
  }

  function addFooter(pageNum) {
    doc.setFontSize(7);
    doc.setTextColor(150, 150, 150);
    doc.text('CONFIDENTIAL — Victaulic Account Conversion Report', margin, pageH - 6);
    doc.text(`Page ${pageNum}`, pageW - margin, pageH - 6, { align: 'right' });
    doc.setTextColor(0, 0, 0);
  }

  function stageProgressText(accountId) {
    let parts = [];
    for (let s = 1; s <= 5; s++) {
      const c = getStageCompletion(accountId, s);
      parts.push(`${c.done}/${c.total}`);
    }
    return parts.join(' | ');
  }

  function overallProgress(accountId) {
    const totalItems = Object.values(STAGES).reduce((s, st) => s + st.items.length, 0);
    const totalDone = Object.keys(STAGES).reduce((s, k) => s + getStageCompletion(accountId, parseInt(k)).done, 0);
    return Math.round(totalDone / totalItems * 100);
  }

  let pageNum = 1;
  const accounts = isManager ? [...state.accounts] : state.accounts.filter(a => a.assigned_to === state.user?.id);
  accounts.sort((a, b) => a.tier - b.tier || a.company_name.localeCompare(b.company_name));

  // ─── PAGE 1: OVERVIEW ───
  let y = addHeader(isManager ? 'Team Report' : 'My Accounts Report');

  // Summary stats
  const au = accounts.filter(a => a.country === 'AU');
  const nz = accounts.filter(a => a.country === 'NZ');
  const stageCounts = [0, 0, 0, 0, 0];
  accounts.forEach(a => stageCounts[a.current_stage - 1]++);

  doc.setFontSize(12);
  doc.setFont('helvetica', 'bold');
  doc.text('Overview', margin, y);
  y += 7;

  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  const stats = [
    `Total Accounts: ${accounts.length}`,
    `Australia: ${au.length}`,
    `New Zealand: ${nz.length}`,
    `Converting (Stage 4+): ${accounts.filter(a => a.current_stage >= 4).length}`
  ];
  stats.forEach((s, i) => {
    doc.text(s, margin + (i * 55), y);
  });
  y += 10;

  // Funnel summary
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('Conversion Pipeline', margin, y);
  y += 7;
  const stageNames = ['IDENTIFY', 'ENGAGE', 'DEMONSTRATE', 'CONVERT', 'GROW & RETAIN'];
  const barMax = Math.max(...stageCounts, 1);
  const stageColors = [[245,130,32],[245,158,11],[59,130,246],[16,185,129],[5,150,105]];
  stageNames.forEach((name, i) => {
    const barW = Math.max((stageCounts[i] / barMax) * 120, 8);
    doc.setFillColor(...stageColors[i]);
    doc.rect(margin + 40, y - 3.5, barW, 5, 'F');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.text(name, margin, y);
    doc.text(String(stageCounts[i]), margin + 42 + barW, y);
    y += 7;
  });
  y += 5;

  // Tier breakdown
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('Tier Breakdown', margin, y);
  y += 6;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  [1, 2, 3].forEach(t => {
    doc.text(`Tier ${t}: ${accounts.filter(a => a.tier === t).length} accounts`, margin + ((t - 1) * 55), y);
  });
  y += 10;

  // Needs Attention
  const weaknesses = [];
  accounts.forEach(a => {
    const comp = getStageCompletion(a.id, a.current_stage);
    if (comp.pct < 50 && comp.total > 0) weaknesses.push({ name: a.company_name, stage: STAGES[a.current_stage].name, pct: comp.pct, tier: a.tier });
  });
  weaknesses.sort((a, b) => a.pct - b.pct);
  if (weaknesses.length) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text('Needs Attention', margin, y);
    y += 2;
    doc.autoTable({
      startY: y,
      margin: { left: margin, right: margin },
      head: [['Company', 'Tier', 'Current Stage', 'Progress']],
      body: weaknesses.slice(0, 10).map(w => [w.name, `T${w.tier}`, w.stage, `${w.pct}%`]),
      styles: { fontSize: 8, cellPadding: 2, font: 'helvetica' },
      headStyles: { fillColor: VIC_BLACK, textColor: [255,255,255], fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [248, 248, 248] },
      columnStyles: { 3: { halign: 'center' } }
    });
    y = doc.lastAutoTable.finalY + 8;
  }

  addFooter(pageNum);

  // ─── PAGE 2: ACCOUNTS TABLE ───
  doc.addPage('a4', 'landscape');
  pageNum++;
  y = addHeader('Account Details');

  doc.autoTable({
    startY: y,
    margin: { left: margin, right: margin },
    head: [['Company', 'Country', 'Tier', 'Regions', 'Sectors', 'Currency', 'Revenue', 'Stage', 'ID|ENG|DEM|CON|GRO', 'Progress', 'Rep']],
    body: accounts.map(a => [
      a.company_name,
      a.country,
      `T${a.tier}`,
      a.regions || '—',
      a.key_sectors || '—',
      a.currency || 'AUD',
      a.estimated_revenue ? `$${formatNumber(a.estimated_revenue)}` : '—',
      STAGES[a.current_stage].name,
      stageProgressText(a.id),
      `${overallProgress(a.id)}%`,
      getRepName(a.assigned_to) || '—'
    ]),
    styles: { fontSize: 7, cellPadding: 2, font: 'helvetica', overflow: 'linebreak' },
    headStyles: { fillColor: VIC_BLACK, textColor: [255,255,255], fontStyle: 'bold', fontSize: 7 },
    alternateRowStyles: { fillColor: [248, 248, 248] },
    columnStyles: {
      0: { cellWidth: 35 },
      3: { cellWidth: 25 },
      4: { cellWidth: 30 },
      8: { cellWidth: 32, halign: 'center', fontSize: 6 },
      9: { halign: 'center' },
      10: { cellWidth: 25 }
    },
    didParseCell: function(data) {
      if (data.section === 'body' && data.column.index === 9) {
        const pct = parseInt(data.cell.raw);
        if (pct >= 80) data.cell.styles.textColor = [5, 150, 105];
        else if (pct >= 40) data.cell.styles.textColor = [245, 158, 11];
        else data.cell.styles.textColor = [220, 38, 38];
      }
    }
  });

  addFooter(pageNum);

  // ─── PAGE 3+: PER-REP BREAKDOWN (managers only) ───
  if (isManager) {
    const reps = {};
    accounts.forEach(a => {
      const name = getRepName(a.assigned_to) || 'Unassigned';
      if (!reps[name]) reps[name] = [];
      reps[name].push(a);
    });

    Object.entries(reps).sort((a, b) => a[0].localeCompare(b[0])).forEach(([repName, repAccounts]) => {
      doc.addPage('a4', 'landscape');
      pageNum++;
      y = addHeader(`Rep: ${repName}`);

      // Rep summary
      const repStages = [0, 0, 0, 0, 0];
      repAccounts.forEach(a => repStages[a.current_stage - 1]++);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.text(`Accounts: ${repAccounts.length}   |   AU: ${repAccounts.filter(a=>a.country==='AU').length}   |   NZ: ${repAccounts.filter(a=>a.country==='NZ').length}   |   Regions: ${[...new Set(repAccounts.flatMap(a=>(a.regions||'').split(',').map(s=>s.trim()).filter(Boolean)))].join(', ') || '—'}`, margin, y);
      y += 8;

      doc.autoTable({
        startY: y,
        margin: { left: margin, right: margin },
        head: [['Company', 'Country', 'Tier', 'Regions', 'Stage', 'ID|ENG|DEM|CON|GRO', 'Progress']],
        body: repAccounts.sort((a,b) => a.tier - b.tier || a.company_name.localeCompare(b.company_name)).map(a => [
          a.company_name,
          a.country,
          `T${a.tier}`,
          a.regions || '—',
          STAGES[a.current_stage].name,
          stageProgressText(a.id),
          `${overallProgress(a.id)}%`
        ]),
        styles: { fontSize: 8, cellPadding: 2, font: 'helvetica' },
        headStyles: { fillColor: VIC_BLACK, textColor: [255,255,255], fontStyle: 'bold' },
        alternateRowStyles: { fillColor: [248, 248, 248] },
        columnStyles: {
          5: { halign: 'center', fontSize: 7 },
          6: { halign: 'center' }
        },
        didParseCell: function(data) {
          if (data.section === 'body' && data.column.index === 6) {
            const pct = parseInt(data.cell.raw);
            if (pct >= 80) data.cell.styles.textColor = [5, 150, 105];
            else if (pct >= 40) data.cell.styles.textColor = [245, 158, 11];
            else data.cell.styles.textColor = [220, 38, 38];
          }
        }
      });

      addFooter(pageNum);
    });
  }

  // ─── REGION HEATMAP PAGE ───
  doc.addPage('a4', 'landscape');
  pageNum++;
  y = addHeader('Region Heatmap');

  const auStates = ['NSW','VIC','QLD','WA','SA','TAS','ACT','NT'];

        else if (v > 0) data.cell.styles.fillColor = [254, 243, 199]; // low
      }
    }
  });
  y = doc.lastAutoTable.finalY + 8;
  }

  if (pdfShowNZ) {

  y += 2;

        const v = data.cell.raw;
        if (v > 5) data.cell.styles.fillColor = [245, 130, 32];
        else if (v > 2) data.cell.styles.fillColor = [253, 186, 116];
        else if (v > 0) data.cell.styles.fillColor = [254, 243, 199];
      }
    }
  });
  }

  addFooter(pageNum);

  // Save
  const filename = isManager
    ? `KAC_Team_Report_${now.toISOString().slice(0,10)}.pdf`
    : `KAC_My_Report_${now.toISOString().slice(0,10)}.pdf`;

// Routes the header PDF button to a report tailored to the current page.
function generatePageReport() {
  const view = state.currentView;
  if (view === 'matrix') return generateMatrixReport();
  if (view === 'heatmap') return generateHeatmapReport();

function _pdfScaffold(orientation) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: orientation || 'landscape', unit: 'mm', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 14;
  const VIC_ORANGE = [245, 130, 32];
  const VIC_BLACK = [26, 26, 26];
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
  function addHeader(title) {
    doc.setFillColor(...VIC_ORANGE); doc.rect(0, 0, pageW, 18, 'F');
    doc.setFillColor(...VIC_BLACK); doc.rect(0, 18, pageW, 10, 'F');
    doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold');
    doc.setFontSize(16); doc.text('VICTAULIC', margin, 12);
    doc.setFontSize(10); doc.text('KEY ACCOUNT CONVERSION', margin + 52, 12);
    doc.setFontSize(9); doc.text(title.toUpperCase(), margin, 25);
    doc.text(dateStr, pageW - margin, 25, { align: 'right' });
    doc.setTextColor(0, 0, 0); return 34;
  }
  function addFooter(pageNum) {
    doc.setFontSize(7); doc.setTextColor(150, 150, 150);
    doc.text('CONFIDENTIAL — Victaulic Account Conversion Report', margin, pageH - 6);
    doc.text(`Page ${pageNum}`, pageW - margin, pageH - 6, { align: 'right' });
    doc.setTextColor(0, 0, 0);
  }
  return { doc, pageW, pageH, margin, VIC_ORANGE, VIC_BLACK, now, dateStr, addHeader, addFooter };
}
function _ovPct(accountId) {
  const totalItems = Object.values(STAGES).reduce((s, st) => s + st.items.length, 0);
  const totalDone = Object.keys(STAGES).reduce((s, k) => s + getStageCompletion(accountId, parseInt(k)).done, 0);
  return totalItems ? Math.round(totalDone / totalItems * 100) : 0;
}
function _repNm(id) { return (state.profiles || []).find(p => p.id === id)?.full_name || ''; }
function _tierLabel(t) { return t === -1 ? 'Owner' : t === 0 ? 'Engineer' : 'T' + t; }
function _hexToRgb(hex) {
  if (!hex) return null;
  let h = String(hex).replace('#', '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  if (!/^[0-9a-f]{6}$/i.test(h)) return null;
  return { r: parseInt(h.slice(0, 2), 16), g: parseInt(h.slice(2, 4), 16), b: parseInt(h.slice(4, 6), 16) };
}
