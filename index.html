function generateAccountReport() {
  const a = state.accounts.find(ac => ac.id === state.currentAccountId);
  if (!a) { toast('No account selected'); return; }
  const s = _pdfScaffold('landscape');
  const { doc, margin, VIC_BLACK, VIC_ORANGE } = s;
  let y = s.addHeader('Account — ' + a.company_name);

  doc.setFontSize(9); doc.setFont('helvetica', 'normal');
  const info = [
    a.hq_city ? 'Location: ' + a.hq_city : null,
    'Country: ' + (a.country === 'AU' ? 'Australia' : 'New Zealand'),
    a.regions ? 'Regions: ' + a.regions : null,
    a.key_sectors ? 'Sectors: ' + a.key_sectors : null,
    a.estimated_revenue ? 'Opportunity: ' + (a.currency || 'AUD') + ' $' + formatNumber(a.estimated_revenue) : null,
    'Rep: ' + (_repNm(a.assigned_to) || '—'),
    'Stage: ' + STAGES[a.current_stage].name + '  |  Checklist: ' + _ovPct(a.id) + '%'
  ].filter(Boolean);
  info.forEach((line, i) => doc.text(line, margin, y + i * 5));
  y += info.length * 5 + 4;

  const rows = state.matrixConfig.rows, cols = state.matrixConfig.cols, statuses = state.matrixConfig.statuses;
  const data = state.matrixData[a.id] || [];
  const approvedStatus = statuses.find(st => st.label === 'Approved');
  const naStatus = statuses.find(st => st.label === 'N/A');
  let approved = 0, na = 0;
  data.forEach(d => { if (approvedStatus && d.status_id === approvedStatus.id) approved++; else if (naStatus && d.status_id === naStatus.id) na++; });
  const eligible = rows.length * cols.length - na;
  const accPct = eligible > 0 ? Math.round(approved / eligible * 100) : 0;
  doc.setFont('helvetica', 'bold'); doc.setFontSize(12); doc.setTextColor(...VIC_ORANGE);
  doc.text('Acceptance: ' + accPct + '%', margin, y);
  doc.setTextColor(0, 0, 0); doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
  y += 6;

  if (rows.length && cols.length) {
    const getStatus = (id) => statuses.find(st => st.id === id);
    doc.autoTable({
      startY: y, margin: { left: margin, right: margin },
      head: [['Product', ...cols.map(c => c.label)]],
      body: rows.map(r => [r.label, ...cols.map(c => {
        const cell = data.find(d => d.row_id === r.id && d.col_id === c.id);
        const st = cell ? getStatus(cell.status_id) : null;
        return st ? st.label : '—';
      })]),
      styles: { fontSize: 7, cellPadding: 1.5, font: 'helvetica', overflow: 'linebreak' },
      headStyles: { fillColor: VIC_BLACK, textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 7 },
      columnStyles: { 0: { fontStyle: 'bold', cellWidth: 28 } },
      didParseCell: function (d) {
        if (d.section === 'body' && d.column.index > 0) {
          const st = statuses.find(x => x.label === d.cell.raw);
          if (st && st.color) { const rgb = _hexToRgb(st.color); if (rgb) d.cell.styles.textColor = [rgb.r, rgb.g, rgb.b]; }
        }
      }
    });

    // --- Milestone dates (per-product timeline) + recent activity ---
    const pageH = doc.internal.pageSize.getHeight();
    const fmt = (iso) => iso ? new Date(iso).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'2-digit' }) : '—';
    const isActioned = (cell) => { if (!cell) return false; const st = getStatus(cell.status_id); return st && st.label !== 'Not Started' && st.label !== 'N/A'; };
    let y2 = doc.lastAutoTable.finalY + 8;
    if (y2 > pageH - 40) { doc.addPage(); y2 = s.addHeader(a.company_name + ' — cont.'); }
    doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(...VIC_BLACK);
    doc.text('Milestone Dates', margin, y2); y2 += 3;
    doc.autoTable({
      startY: y2, margin: { left: margin, right: margin },
      head: [['Product', ...cols.map(c => c.label)]],
      body: rows.map(r => [r.label, ...cols.map(c => {
        const cell = data.find(d => d.row_id === r.id && d.col_id === c.id);
        return isActioned(cell) ? fmt(cell.updated_at) : '—';
      })]),
      styles: { fontSize: 7, cellPadding: 1.5, font: 'helvetica', overflow: 'linebreak', textColor: [90,90,90] },
      headStyles: { fillColor: VIC_BLACK, textColor: [255,255,255], fontStyle: 'bold', fontSize: 7 },
      columnStyles: { 0: { fontStyle: 'bold', cellWidth: 28, textColor: VIC_BLACK } }
    });
    const activity = [];
    rows.forEach(r => cols.forEach(c => {
      const cell = data.find(d => d.row_id === r.id && d.col_id === c.id);
      if (isActioned(cell) && cell.updated_at) { const st = getStatus(cell.status_id); activity.push({ date: cell.updated_at, txt: `${fmt(cell.updated_at)}    ${r.label} · ${c.label}  (${st.label})` }); }
    }));
    activity.sort((x, z) => (x.date < z.date ? 1 : -1));
    let y4 = doc.lastAutoTable.finalY + 8;
    if (y4 > pageH - 30) { doc.addPage(); y4 = s.addHeader(a.company_name + ' — cont.'); }
    doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(...VIC_BLACK);
    doc.text('Recent Activity', margin, y4); y4 += 6;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(70,70,70);
    activity.slice(0, 40).forEach(act => {
      if (y4 > pageH - 14) { doc.addPage(); y4 = s.addHeader(a.company_name + ' — cont.'); doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(70,70,70); }
      doc.text(act.txt, margin, y4); y4 += 4.5;
    });
  }
  s.addFooter(1);
  doc.save(`KAC_Account_${a.company_name.replace(/[^a-z0-9]+/gi, '_')}_${s.now.toISOString().slice(0, 10)}.pdf`);
  toast('PDF report downloaded');
}

  const regCounts = {};
  accounts.forEach(a => {

  doc.autoTable({

function generateMatrixReport() {
  const cfg = state.matrixConfig || {};
  const products = cfg.rows || [];
  const cols = cfg.cols || [];
  const statuses = cfg.statuses || [];
  if (!products.length || !cols.length) { toast('No matrix configured yet'); return; }
  const approvedStatus = statuses.find(x => x.label === 'Approved');
  const naStatus = statuses.find(x => x.label === 'N/A');
  const statusById = id => statuses.find(x => x.id === id);
  const accts = getDashFilteredAccounts().map(a => {
    const data = state.matrixData[a.id] || [];
    let approved = 0, eligible = 0;
    products.forEach(row => cols.forEach(col => {
      const cell = data.find(d => d.row_id === row.id && d.col_id === col.id);
      if (cell && naStatus && cell.status_id === naStatus.id) return;
      eligible++;
      if (cell && approvedStatus && cell.status_id === approvedStatus.id) approved++;
    }));
    return { ...a, mxRate: eligible > 0 ? Math.round(approved / eligible * 100) : 0 };
  }).sort((a, b) => b.mxRate - a.mxRate || a.company_name.localeCompare(b.company_name));

  const s = _pdfScaffold('landscape');
  const { doc, margin, VIC_BLACK } = s;
  let y = s.addHeader('Acceptance Matrix');
  doc.setFontSize(8); doc.setFont('helvetica', 'normal');
  doc.text(`${accts.length} account${accts.length === 1 ? '' : 's'}   Legend:  A = Approved   P = In Progress   X = Not Allowed   - = N/A   blank = Not Started`, margin, y);
  y += 6;

  const shortFor = lbl => lbl === 'Approved' ? 'A' : lbl === 'In Progress' ? 'P' : lbl === 'Not Allowed' ? 'X' : lbl === 'N/A' ? '-' : '';
  const head = [['Company', '%', ...products.map(p => p.label || p.name || '')]];
  const cellColors = [];
  const body = accts.map(a => {
    const data = state.matrixData[a.id] || [];
    const rowColors = [];
    const cells = products.map(row => {
      let best = null;
      cols.forEach(col => {
        const cell = data.find(d => d.row_id === row.id && d.col_id === col.id);
        if (cell) { const st = statusById(cell.status_id); if (st && st.label !== 'Not Started') best = st; }
      });
      rowColors.push(best && best.color ? best.color : null);
      return best ? shortFor(best.label) : '';
    });
    cellColors.push(rowColors);
    return [a.company_name, a.mxRate + '%', ...cells];
  });

  doc.autoTable({
    startY: y, margin: { left: margin, right: margin },
    head, body,
    styles: { fontSize: 7, cellPadding: 1.5, font: 'helvetica', halign: 'center', overflow: 'linebreak' },
    headStyles: { fillColor: VIC_BLACK, textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 6 },
    alternateRowStyles: { fillColor: [248, 248, 248] },
    columnStyles: { 0: { halign: 'left', cellWidth: 40 }, 1: { halign: 'center', cellWidth: 12, fontStyle: 'bold' } },
    didParseCell: function (d) {
      if (d.section === 'body' && d.column.index >= 2) {
        const color = cellColors[d.row.index] && cellColors[d.row.index][d.column.index - 2];
        const rgb = _hexToRgb(color);
        if (rgb) { d.cell.styles.fillColor = [rgb.r, rgb.g, rgb.b]; d.cell.styles.textColor = [255, 255, 255]; d.cell.styles.fontStyle = 'bold'; }
      }
    }
  });
  s.addFooter(1);
  doc.save(`KAC_Matrix_${s.now.toISOString().slice(0, 10)}.pdf`);
  toast('PDF report downloaded');
}

      8: { halign: 'center' },
      9: { halign: 'center' },
      10: { halign: 'center' },
      12: { cellWidth: 35 }
    },
    didParseCell: function(data) {
      if (data.section === 'body' && data.column.index === 4) {
        const v = parseInt(data.cell.raw);
        if (v >= 5) data.cell.styles.textColor = [5, 150, 105];
        else if (v > 0) data.cell.styles.textColor = [245, 158, 11];
      }
    }
  });

  // Footer
  doc.setFontSize(7);
  doc.setTextColor(150, 150, 150);
  doc.text('CONFIDENTIAL — Victaulic Account Conversion Team Summary', margin, pageH - 6);
  doc.text('Page 1', pageW - margin, pageH - 6, { align: 'right' });

  doc.save(`KAC_Team_Summary_${now.toISOString().slice(0,10)}.pdf`);
  toast('Team summary exported');
}

// ======================== SECTOR CHIPS ========================
function renderChips(wrapperId, options, selectedStr) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  const selected = (selectedStr || '').split(',').map(s => s.trim()).filter(Boolean);
  wrap.innerHTML = options.map(s =>
    `<span class="sector-chip ${selected.includes(s) ? 'selected' : ''}" onclick="this.classList.toggle('selected')">${s}</span>`
  ).join('');
}
function getChipValues(wrapperId) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return '';
  return [...wrap.querySelectorAll('.sector-chip.selected')].map(el => el.textContent).join(', ');
}
// Dynamic sector list — admin-managed via kac_sectors, falls back to built-in defaults
function getSectorsList() { return (state.sectorConfig && state.sectorConfig.length) ? state.sectorConfig.map(s => s.label) : SECTORS; }
function renderSectorChips(id, sel) { renderChips(id, getSectorsList(), sel); }

async function handleSaveAccount(e, existingId) {
  e.preventDefault();

  data.country = document.getElementById('acc-country').value;
  data.tier = parseInt(document.getElementById('acc-tier').value);
  data.hq_city = document.getElementById('acc-city').value.trim();
  data.key_sectors = getChipValues('acc-sectors-wrap');
  data.regions = getChipValues('acc-regions-wrap');
  data.currency = document.getElementById('acc-currency').value;
  data.estimated_revenue = document.getElementById('acc-revenue').value.replace(/,/g, '').trim();
  if (existingId) data.psa_tier = document.getElementById('acc-psa')?.value || '';
  if (existingId) data.assigned_to = document.getElementById('acc-assigned')?.value || data.assigned_to;

  await saveAccount(data);
  closeModal();
  renderAccountsList();
  if (existingId) renderAccountDetail();
  toast(existingId ? 'Account updated' : 'Account added');
}

}

async function handleSaveContact(e, existingId, accountId) {
  e.preventDefault();
  const data = existingId ? { ...(state.contacts[accountId] || []).find(c => c.id === existingId) } : { account_id: accountId };
  data.contact_name = document.getElementById('ct-name').value.trim();
  data.role = document.getElementById('ct-role').value;
  data.division = document.getElementById('ct-division').value.trim();
  data.reports_to = document.getElementById('ct-reports-to').value || null;
  data.email = document.getElementById('ct-email').value.trim();
  data.phone = document.getElementById('ct-phone').value.trim();
  data.is_key_influencer = document.getElementById('ct-influencer').checked;
  await saveContact(data);
  // Apply "Manages": set/clear reports_to on the selected direct reports
  const managesSel = Array.from(document.getElementById('ct-manages')?.selectedOptions || []).map(o => o.value);
  const acctContacts = [...(state.contacts[accountId] || [])];
  for (const ct of acctContacts) {
    if (ct.id === data.id) continue;
    const shouldManage = managesSel.includes(ct.id);
    const currentlyManaged = ct.reports_to === data.id;
    if (shouldManage && !currentlyManaged) await saveContact({ ...ct, reports_to: data.id });
    else if (!shouldManage && currentlyManaged) await saveContact({ ...ct, reports_to: null });
  }
  closeModal();
  renderDetailTab();
  toast(existingId ? 'Contact updated' : 'Contact added');
}

// ======================== INIT ========================
async function init() {
  // Restore remember-me checkbox state
  const rememberPref = localStorage.getItem('kac_remember_me');
  const rememberBox = document.getElementById('login-remember');
  if (rememberBox && rememberPref !== null) rememberBox.checked = rememberPref !== 'false';

  // Check for existing session
  const { data: { session } } = await supa.auth.getSession();
  if (session) {
    state.user = session.user;
    await loadProfile();
    if (state.profile?.must_change_password) {
      showForcePasswordChange();
    } else {
      await initialSync();
      enterApp();
    }
  }

  // Listen for auth state changes (handles password reset redirect)
  supa.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      const newPw = prompt('Enter your new password:');
      if (newPw) {
        supa.auth.updateUser({ password: newPw }).then(({ error }) => {
          if (error) alert('Error: ' + error.message);
          else { alert('Password updated. Please sign in.'); showLoginForm(); }
        });
      }
    }
  });
}

init();
