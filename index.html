function switchDetailTab(tab) {
  state.detailTab = tab;
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().trim() === tab));
  const f = document.getElementById('detail-funnel');
  if (f) f.style.display = tab === 'checklist' ? '' : 'none';
  renderDetailTab();
}

function renderDetailTab() {
  const el = document.getElementById('detail-tab-content');
  if (!el) return;
  if (state.detailTab === 'checklist') renderChecklist(el);
  else if (state.detailTab === 'acceptance') renderAcceptanceTab(el);
  else if (state.detailTab === 'contacts') renderContacts(el);
  else if (state.detailTab === 'notes') renderNotes(el);
}

// ======================== RENDER: ACCEPTANCE MATRIX ========================
function renderAcceptanceTab(container) {
  const accountId = state.currentAccountId;
  const rows = state.matrixConfig.rows;
  const cols = state.matrixConfig.cols;
  const statuses = state.matrixConfig.statuses;
  const data = state.matrixData[accountId] || [];

  if (!rows.length || !cols.length) {
    container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--g400)">No acceptance matrix configured yet. An admin can set up product rows and milestone columns in the Admin panel.</div>';
    return;
  }

  const getCell = (rowId, colId) => data.find(d => d.row_id === rowId && d.col_id === colId);
  const getStatus = (statusId) => statuses.find(s => s.id === statusId);
  const defaultStatus = statuses.find(s => s.label === 'Not Started') || statuses[0];
  const editable = canEditMatrix(accountId);

  // ---- COMPUTE SCORECARD DATA FIRST ----
  const totalCells = rows.length * cols.length;
  const statusCounts = {};
  statuses.forEach(s => statusCounts[s.id] = 0);
  data.forEach(d => { if (statusCounts[d.status_id] !== undefined) statusCounts[d.status_id]++; });

  const approvedStatus = statuses.find(s => s.label === 'Approved');
  const rejectedStatus = statuses.find(s => s.label === 'Not Allowed');
  const naStatus = statuses.find(s => s.label === 'N/A');
  const approvedCount = approvedStatus ? (statusCounts[approvedStatus.id] || 0) : 0;
  const rejectedCount = rejectedStatus ? (statusCounts[rejectedStatus.id] || 0) : 0;
  const naCount = naStatus ? (statusCounts[naStatus.id] || 0) : 0;
  const eligibleCells = totalCells - naCount;
  const acceptanceRate = eligibleCells > 0 ? Math.round(approvedCount / eligibleCells * 100) : 0;
  const activeCells = data.filter(d => { const st = getStatus(d.status_id); return st && st.label !== 'Not Started' && st.label !== 'N/A'; }).length;
  const scoreColor = acceptanceRate > 0 ? '#F58220' : '#94A3B8';

  // ---- SCORECARD (above grid) — mirrors the dashboard Acceptance Matrix box ----
  const _mp = state.dashStageMonth.split('-').map(Number);
  const _mStart = state.dashStageMonth + '-01T00:00:00.000Z';
  const _mEnd = new Date(Date.UTC(_mp[0], _mp[1], 1)).toISOString();
  const statusGain = {}; statuses.forEach(s => statusGain[s.id] = 0);
  data.forEach(d => { if (statusGain[d.status_id] !== undefined && d.updated_at && d.updated_at >= _mStart && d.updated_at < _mEnd) statusGain[d.status_id]++; });
  const scActioned = statuses.reduce((n,s) => s.label === 'Not Started' ? n : n + (statusCounts[s.id]||0), 0);
  const scStatusBoxes = totalCells > 0 ? statuses.map(s => {
    const cnt = s.label === 'Not Started' ? (totalCells - scActioned) : (statusCounts[s.id] || 0);
    const boxPct = Math.round(cnt / totalCells * 100);
    const gPts = Math.round((statusGain[s.id]||0) / totalCells * 1000) / 10;
    const gColor = gPts > 0 ? 'var(--success)' : gPts < 0 ? '#ef4444' : 'var(--g400)';
    const gArrow = gPts > 0 ? '▲' : gPts < 0 ? '▼' : '–';
    const bc = s.label === 'Not Started' ? '#1f2937' : (s.label === 'N/A') ? '#94A3B8' : s.color;
    return `<div style="flex:1;text-align:center;padding:8px 6px;border-radius:6px;background:${bc}14;border:1px solid ${bc}33">
      <div style="font-size:11px;font-weight:600;color:${bc};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.label)}</div>
      <div style="font-size:20px;font-weight:700;color:${bc};line-height:1.1;margin-top:2px">${boxPct}%</div>
      <div style="font-size:12px;font-weight:700;color:${gColor};margin-top:3px">${gArrow} ${Math.abs(gPts)} pts</div>
    </div>`;
  }).join('') : '';
  const scBarSegs = totalCells > 0 ? statuses.map(s => {
    const cnt = s.label === 'Not Started' ? (totalCells - scActioned) : (statusCounts[s.id] || 0);
    if (cnt <= 0) return '';
    const segStyle = s.label === 'Not Started' ? 'background:#1f2937' : `background:${s.label === 'N/A' ? '#94A3B8' : s.color}`;
    return `<div style="width:${cnt/totalCells*100}%;${segStyle}" title="${esc(s.label)}: ${cnt}"></div>`;
  }).join('') : '';
  let html = `<div class="dash-section" style="padding:14px 16px;margin:0 0 12px">
    <div style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--g500);margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px">
      <span>Product Acceptance · ${stageMonthLabel()}</span>
      <span onclick="const i=this.querySelector('input');i.showPicker?i.showPicker():i.focus();" title="Change month — look back" style="cursor:pointer;color:var(--g400);display:inline-flex;align-items:center;position:relative">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <input type="month" value="${state.dashStageMonth}" max="${new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0')}" onchange="setStageMonth(this.value)" style="position:absolute;left:0;bottom:0;width:1px;height:1px;opacity:0;pointer-events:none">
      </span>
    </div>
    <div style="display:flex;gap:6px">${scStatusBoxes}</div>
    <div style="height:10px;background:var(--g100);border-radius:5px;overflow:hidden;margin:12px 0 0;display:flex">${scBarSegs}</div>
  </div>`;

  // ---- PER-PRODUCT SUMMARY ----
  html += `<div class="dash-section" style="margin:0 0 12px">
    <div style="display:grid;grid-template-columns:repeat(5,1fr)">`;
  rows.forEach((row, i) => {
    const rowData = data.filter(d => d.row_id === row.id);
    const rowApproved = rowData.filter(d => approvedStatus && d.status_id === approvedStatus.id).length;
    const rowNA = rowData.filter(d => naStatus && d.status_id === naStatus.id).length;
    const rowEligible = cols.length - rowNA;
    const rowPct = rowEligible > 0 ? Math.round(rowApproved / rowEligible * 100) : 0;
    const divider = (i % 5 !== 4) && (i !== rows.length - 1);
    html += acceptanceBox(row.label, rowPct, divider, editable ? `editMatrixRow('${accountId}','${row.id}')` : '');
  });
  html += `</div></div>`;


  // ---- MATRIX GRID ----
  html += `<div style="overflow-x:auto;border:1px solid var(--g200);border-radius:8px">
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr>
        <th ${editable ? `class="mx-click" onclick="editMatrixAll('${accountId}')"` : ''} style="text-align:left;padding:13px 12px;background:var(--g50);font-weight:700;color:var(--g500);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--g200);position:sticky;left:0;z-index:2;cursor:${editable?'pointer':'default'};white-space:nowrap" title="${editable?'Set every product and milestone at once':''}">${editable ? 'Apply all' : ''}</th>
        ${cols.map(c => `<th ${editable ? `class="mx-click" onclick="editMatrixCol('${accountId}','${c.id}')"` : ''} style="text-align:center;padding:13px 6px;background:var(--g50);font-weight:600;color:var(--g700);font-size:11px;border-bottom:2px solid var(--g200);border-left:1px solid var(--g200);cursor:${editable?'pointer':'default'}" title="${editable?'Set the status for this milestone across all products':''}">${esc(c.label)}</th>`).join('')}
      </tr></thead>
      <tbody>`;

  rows.forEach((row, ri) => {
    const isLast = ri === rows.length - 1;
    html += `<tr>
      <td ${editable ? `class="mx-click" onclick="editMatrixRow('${accountId}','${row.id}')"` : ''} style="padding:8px 12px;font-weight:600;font-size:12px;color:var(--g700);background:var(--g50);border-bottom:${isLast?'none':'1px solid var(--g200)'};position:sticky;left:0;z-index:1;white-space:nowrap;cursor:${editable?'pointer':'default'}" title="${editable?'Click to set the status for every milestone of this product':''}">${esc(row.label)}</td>`;
    cols.forEach(col => {
      const cell = getCell(row.id, col.id);
      const status = cell ? getStatus(cell.status_id) : defaultStatus;
      const color = status?.color || '#94A3B8';
      const displayColor = (status && status.label === 'N/A' && defaultStatus?.color) ? defaultStatus.color : color;
      const actioned = cell && status && status.label !== 'Not Started' && status.label !== 'N/A';
      const dateTxt = actioned && cell.updated_at ? new Date(cell.updated_at).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'2-digit'}) : '';
      html += `<td ${editable ? `class="mx-click" onclick="editMatrixCell('${accountId}','${row.id}','${col.id}')"` : ''} style="padding:7px 4px;border-left:1px solid var(--g200);border-bottom:${isLast?'none':'1px solid var(--g200)'};background:${(status && status.label === 'Not Started') ? 'transparent' : displayColor + '2b'};text-align:center;min-width:80px;cursor:${editable?'pointer':'default'}" title="${editable?'Update status & date':''}">
        <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:26px">
          <div style="font-size:11px;font-weight:600;color:${displayColor};line-height:1.2">${esc(status?.label || 'Not Started')}</div>
          ${actioned && dateTxt ? `<div style="font-size:11px;color:var(--g400);margin-top:2px;line-height:1">${dateTxt}</div>` : ''}
        </div>
      </td>`;
    });
    html += `</tr>`;
  });

  html += `</tbody></table></div>`;

  container.innerHTML = html;
}

function canEditMatrix(accountId) {
  const role = state.profile?.role;
  if (role === 'admin' || role === 'director') return true;
  const account = state.accounts.find(a => a.id === accountId);
  if (!account) return false;
  if (role === 'rep') return account.assigned_to === state.user?.id;
  // Manager: can edit if account is assigned to them or one of their reports
  if (role === 'manager') {
    if (account.assigned_to === state.user?.id) return true;
    const myReports = (state.profiles || []).filter(p => p.reports_to === state.user?.id).map(p => p.id);
    return myReports.includes(account.assigned_to);
  }
  return false;
}

function showMatrixPicker(accountId, rowId, colId, el) {
  if (!canEditMatrix(accountId)) { toast('You can only update your own accounts'); return; }
  // Remove any existing picker
  document.querySelectorAll('.matrix-picker').forEach(p => p.remove());

  const statuses = state.matrixConfig.statuses;
  const picker = document.createElement('div');
  picker.className = 'matrix-picker';
  picker.style.cssText = 'position:absolute;z-index:200;background:var(--white);border:1px solid var(--g200);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);padding:4px;min-width:140px';

  statuses.forEach(s => {
    const opt = document.createElement('div');
    opt.style.cssText = `padding:8px 12px;cursor:pointer;border-radius:6px;font-size:13px;display:flex;align-items:center;gap:8px;transition:background .1s`;
    opt.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${s.color};flex-shrink:0"></span>${esc(s.label)}`;
    opt.onmouseover = () => opt.style.background = 'var(--g50)';
    opt.onmouseout = () => opt.style.background = '';
    opt.onclick = (e) => { e.stopPropagation(); setMatrixCell(accountId, rowId, colId, s.id); picker.remove(); };
    picker.appendChild(opt);
  });

  // Position relative to the clicked cell
  const rect = el.getBoundingClientRect();
  picker.style.position = 'fixed';
  picker.style.left = rect.left + 'px';
  picker.style.top = (rect.bottom + 4) + 'px';

  document.body.appendChild(picker);

  // Close on outside click
  const close = (e) => { if (!picker.contains(e.target)) { picker.remove(); document.removeEventListener('click', close); } };
  setTimeout(() => document.addEventListener('click', close), 0);
}

async function setMatrixCell(accountId, rowId, colId, statusId) {
  const now = new Date().toISOString();
  const existing = (state.matrixData[accountId] || []).find(d => d.row_id === rowId && d.col_id === colId);

  if (existing) {
    existing.status_id = statusId;
    existing.updated_at = now;
    existing.updated_by = state.user?.id;
  } else {
    const newEntry = { id: uuid(), account_id: accountId, row_id: rowId, col_id: colId, status_id: statusId, updated_at: now, updated_by: state.user?.id };
    if (!state.matrixData[accountId]) state.matrixData[accountId] = [];
    state.matrixData[accountId].push(newEntry);
  }

  // Re-render immediately
  const el = document.getElementById('detail-tab-content');
  if (el && state.detailTab === 'acceptance') renderAcceptanceTab(el);

  // Save to Supabase
  try {
    const { error } = await supa.from('kac_matrix_data').upsert({
      account_id: accountId,
      row_id: rowId,
      col_id: colId,
      status_id: statusId,
      updated_at: now,
      updated_by: state.user?.id
    }, { onConflict: 'account_id,row_id,col_id' });
    if (error) throw error;
  } catch (e) {
    console.error('Matrix save error:', e);
    toast('Failed to save — will retry on sync');
  }
}

// ======================== RENDER: CHECKLIST ========================
function renderChecklist(container) {
  const accountId = state.currentAccountId;
  let html = '';
  for (let s = 1; s <= 5; s++) {
    const stage = STAGES[s];
    const comp = getStageCompletion(accountId, s);
    const complete = isStageComplete(accountId, s);
    const accessible = canAccessStage(accountId, s);
    const account = state.accounts.find(a => a.id === accountId);
    const isCurrent = account && account.current_stage === s;
    const expanded = isCurrent || (s === 1 && !complete);

    let numClass = complete ? 'completed' : (accessible ? 'current' : 'locked');
    let progressText = complete ? '&#10003;' : `${comp.done}/${comp.total}`;
    let progressClass = complete ? 'complete' : '';

    html += `<div class="stage-section ${expanded ? 'expanded' : ''}" id="stage-section-${s}">
      <div class="stage-header" onclick="toggleStageSection(${s})">
        <div class="stage-number ${numClass}">${complete ? '&#10003;' : s}</div>
        <div class="stage-header-text">
          <h4>${stage.name}</h4>
          <p>${stage.subtitle}</p>
        </div>
        <span class="stage-progress-mini ${progressClass}">${progressText}</span>
        <svg class="stage-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="stage-items">`;

    stage.items.forEach(item => {
      const cl = (state.checklist[accountId] || []).find(c => c.stage === s && c.item_key === item.key);
      const checked = cl && cl.completed;
      const disabled = !accessible;
      const doneDate = checked && cl.completed_at ? new Date(cl.completed_at).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}) : '';
      html += `<div class="check-item ${checked ? 'checked' : ''} ${disabled ? 'disabled' : ''}">
        <input type="checkbox" ${checked ? 'checked' : ''} ${disabled ? 'disabled' : ''}
          onchange="handleChecklistToggle('${accountId}', ${s}, '${item.key}', this.checked)">
        <label style="flex:1">${esc(item.label)}</label>
        ${doneDate ? `<span onclick="event.stopPropagation();editCompletionDate('${accountId}',${s},'${item.key}')" style="font-size:11px;color:var(--g400);white-space:nowrap;margin-left:8px;cursor:pointer;border-bottom:1px dashed var(--g300)" title="Click to edit date">${doneDate}</span>` : ''}
      </div>`;
    });

    if (!accessible && s === 5) {
      html += `<div style="padding:14px 16px;font-size:13px;color:var(--g500);font-style:italic">Complete all prior stages to unlock Grow & Retain</div>`;
    }

    html += '</div></div>';
  }
  container.innerHTML = html;
}

function toggleStageSection(s) {
  document.getElementById('stage-section-' + s)?.classList.toggle('expanded');
}

async function handleChecklistToggle(accountId, stage, itemKey, completed) {
  await toggleChecklistItem(accountId, stage, itemKey, completed);
  renderAccountDetail();
  toast(completed ? 'Task completed' : 'Task unchecked');
}

function editCompletionDate(accountId, stage, itemKey) {
  const cl = (state.checklist[accountId] || []).find(c => c.stage === stage && c.item_key === itemKey);
  if (!cl || !cl.completed) return;
  const current = cl.completed_at ? cl.completed_at.slice(0, 10) : new Date().toISOString().slice(0, 10);
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = `<div style="background:var(--white);border-radius:12px;padding:24px;width:300px;box-shadow:0 8px 32px rgba(0,0,0,.2)">

          <div style="display:flex;gap:8px;margin-top:14px">

          </div>
        </div>
      </div>`;
    });
  }

  // Org chart (reports-to tree) under the contacts list
  if (contacts.length) {
    const byId = {}; contacts.forEach(c => byId[c.id] = c);
    const childrenMap = {};
    contacts.forEach(c => { const key = (c.reports_to && byId[c.reports_to]) ? c.reports_to : '__root__'; (childrenMap[key] = childrenMap[key] || []).push(c); });

// Styled confirmation popover anchored near the cursor. Returns a promise<boolean>.
function confirmNear(event, message, okLabel = 'Delete') {
  return new Promise(resolve => {
    document.querySelectorAll('.confirm-pop').forEach(el => el.remove());
    const pop = document.createElement('div');
    pop.className = 'confirm-pop';
    pop.innerHTML = `<div class="cp-msg">${message}</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="cp-cancel">Cancel</button>
        <button class="cp-ok">${okLabel}</button>
      </div>`;
    document.body.appendChild(pop);
    const x = event && event.clientX ? event.clientX : window.innerWidth / 2;
    const y = event && event.clientY ? event.clientY : window.innerHeight / 2;
    const r = pop.getBoundingClientRect();
    let left = x + 10, top = y + 10;
    if (left + r.width > window.innerWidth - 8) left = Math.max(8, x - r.width - 10);
    if (top + r.height > window.innerHeight - 8) top = Math.max(8, y - r.height - 10);
    pop.style.left = left + 'px';
    pop.style.top = top + 'px';
    const done = (val) => { pop.remove(); document.removeEventListener('mousedown', outside, true); resolve(val); };
    const outside = (e) => { if (!pop.contains(e.target)) done(false); };
    pop.querySelector('.cp-cancel').onclick = () => done(false);
    pop.querySelector('.cp-ok').onclick = () => done(true);
    setTimeout(() => document.addEventListener('mousedown', outside, true), 0);
  });
}
async function confirmDeleteContact(contactId, accountId, event) {
  if (await confirmNear(event, 'Remove this contact?', 'Delete')) {
    await deleteContact(contactId, accountId);
    renderDetailTab();
    toast('Contact removed');
  }
}

      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>`;

  if (!notes.length) {
    html += '<div class="empty-state"><p>No notes yet. Add updates as you progress through the conversion stages.</p></div>';
  } else {
    notes.forEach(n => {
      html += `<div class="note-entry">
        <div class="note-meta">${authorName(n.created_by)} — ${formatDateTime(n.created_at)}</div>
        <div class="note-text">${esc(n.note)}</div>
      </div>`;
    });
  }
  container.innerHTML = html;
}

async function handleAddNote(accountId) {
  const input = document.getElementById('note-text');
  const text = input?.value?.trim();
  if (!text) return;
  await addNote(accountId, text);
  renderDetailTab();
  toast('Note added');
}

function renderDashMetrics() {
  const mel = document.getElementById('dash-metrics');
  if (!mel) return;
  // Acceptance Matrix tab hides the stat box + opportunity bar.
  if (state.dashMode === 'matrix' || state.dashMode === 'heatmap') { mel.innerHTML = ''; return; }
  let accounts = getDashFilteredAccounts();
  accounts.forEach(a => { a.current_stage = recalcCurrentStage(a.id); });
  if (state.dashMode === 'stalled') {
    const _sc = new Date(Date.now() - state.stalledDays*24*60*60*1000).toISOString();
    accounts = accounts.filter(a => { const cl = state.checklist[a.id] || []; if (!cl.length) return true; const latest = cl.reduce((m,c) => c.completed_at && c.completed_at > m ? c.completed_at : m, ''); return !latest || latest < _sc; });
  }
  const stalledCutoff = new Date(Date.now() - state.stalledDays*24*60*60*1000).toISOString();
  const stalled = accounts.filter(a => {
    const cl = state.checklist[a.id] || [];
    if (!cl.length) return true;
    const latest = cl.reduce((max,c) => c.completed_at && c.completed_at > max ? c.completed_at : max, '');
    return !latest || latest < stalledCutoff;
  }).length;
  const thisMonth = new Date().toISOString().slice(0,7);
  const active = accounts.filter(a => {
    const cl = state.checklist[a.id] || [];
    return cl.some(c => c.completed_at && c.completed_at.slice(0,7) === thisMonth);
  }).length;
  const stagesAdvanced = accounts.reduce((sum,a) => sum + stageCrossingsInMonth(a, state.dashStageMonth), 0);
  const isManager = state.profile?.role === 'manager' || state.profile?.role === 'admin' || state.profile?.role === 'director';
  const au = accounts.filter(a => a.country === 'AU');
  const nz = accounts.filter(a => a.country === 'NZ');
  const fx = fxSymbol();
  const auRev = au.reduce((s,a) => s + toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency), 0);
  const nzRev = nz.reduce((s,a) => s + toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency), 0);
  const totalRev = auRev + nzRev;
  // Always show AU/NZ split from actual filtered account data
  const auPct = totalRev > 0 ? (auRev / totalRev * 100) : 50;
  const nzPct = totalRev > 0 ? (nzRev / totalRev * 100) : 50;
  const oppHtml = `<div class="dash-section" style="text-align:center;padding:14px 16px">
    <div style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--g500);margin-bottom:6px">Total Opportunity</div>
    <div style="font-size:28px;font-weight:800;color:var(--g700);line-height:1;margin:0 0 12px">${fx}${formatNumber(Math.round(totalRev))}</div>
    <div style="display:flex;height:10px;border-radius:5px;overflow:hidden;cursor:pointer">
      ${auRev > 0 ? `<div onclick="setDashFilter('dashFilterCountry','AU')" style="width:${Math.max(auPct,5)}%;background:var(--vic-orange);transition:width .3s"></div>` : ''}
      ${nzRev > 0 ? `<div onclick="setDashFilter('dashFilterCountry','NZ')" style="width:${Math.max(nzPct,5)}%;background:#3b82f6;transition:width .3s"></div>` : ''}
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px;font-weight:600">
      ${auRev > 0 ? `<span style="color:var(--vic-orange)">${fx}${formatNumber(Math.round(auRev))}</span>` : ''}
      ${nzRev > 0 ? `<span style="color:#3b82f6;margin-left:auto">${fx}${formatNumber(Math.round(nzRev))}</span>` : ''}
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:2px;font-size:12px;font-weight:700">
      ${auRev > 0 ? `<span style="color:var(--vic-orange)">AU ${Math.round(auPct)}%</span>` : ''}
      ${nzRev > 0 ? `<span style="color:#3b82f6;margin-left:auto">NZ ${Math.round(nzPct)}%</span>` : ''}
    </div>
  </div>`;

  const sLabel = 'font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--g500);margin-bottom:4px';
  const sNum = 'font-size:28px;font-weight:800;line-height:1';
  mel.innerHTML = `<div class="dash-section" style="padding:14px 0">
    <div style="display:flex;text-align:center;align-items:center">
      <div onclick="filterToAccounts()" style="cursor:pointer;flex:1;border-right:1px solid var(--g200)"><div style="${sLabel}">Accounts</div><div style="${sNum};color:var(--vic-black)">${accounts.length}</div></div>
      <div onclick="filterToStalled()" style="cursor:pointer;flex:1;border-right:1px solid var(--g200)"><div style="${sLabel}">Stalled</div><div style="${sNum};color:${stalled > 0 ? '#ef4444' : 'var(--success)'}">${stalled}</div></div>
      <div onclick="filterToActiveThisMonth()" style="cursor:pointer;flex:1;border-right:1px solid var(--g200)"><div style="${sLabel}">Active This Month</div><div style="${sNum};color:#3b82f6">${active}</div></div>
      <div style="flex:1">
        <div style="${sLabel}">Steps Advanced</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:5px">
          <span style="${sNum};color:var(--success)">${stagesAdvanced}</span>
          <span onclick="event.stopPropagation();const i=this.querySelector('input');i.showPicker?i.showPicker():i.focus();" title="Change month — ${stageMonthLabel()}" style="cursor:pointer;color:var(--g400);display:inline-flex;align-items:center;position:relative;transform:translateX(80%)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <input type="month" value="${state.dashStageMonth}" max="${new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0')}" onchange="setStageMonth(this.value)" onclick="event.stopPropagation()" style="position:absolute;left:0;bottom:0;width:1px;height:1px;opacity:0;pointer-events:none">
          </span>
        </div>
      </div>
    </div>
  </div>
  ${oppHtml}`;
}

// Sector tab — shows the sector graph and hides the conversion pipeline; Summary is the inverse.
function renderDashboardOppSector() { renderDashboardSummary(true, false); }

function renderDashboardSummary(showSector = false, showPipeline = true) {
  const el = document.getElementById('dash-content');
  const accounts = getDashFilteredAccounts();
  // Always recalc stages from checklist truth before rendering
  accounts.forEach(a => { a.current_stage = recalcCurrentStage(a.id); });
  const isManager = state.profile?.role === 'manager' || state.profile?.role === 'admin' || state.profile?.role === 'director';
  const au = accounts.filter(a => a.country === 'AU');
  const nz = accounts.filter(a => a.country === 'NZ');
  const stageCounts = [0, 0, 0, 0, 0];
  const stageOpp = [0, 0, 0, 0, 0];
  accounts.forEach(a => { stageCounts[a.current_stage - 1]++; stageOpp[a.current_stage - 1] += toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency); });
  const maxCount = Math.max(...stageCounts, 1);

  // Opportunity by sector (each account counts toward every sector it lists).
  // Only show sectors that still exist in the admin list, so deleted ones (e.g. a
  // removed "Military" tag still lingering in account data) drop off the graph.
  const validSectors = getSectorsList();
  const sectorOpp = {};
  accounts.forEach(a => {
    const opp = toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency);
    const isNZ = a.country === 'NZ';
    (a.key_sectors||'').split(',').map(x=>x.trim()).filter(Boolean).forEach(sec => {
      if (!validSectors.includes(sec)) return;
      if (!sectorOpp[sec]) sectorOpp[sec] = { au: 0, nz: 0, total: 0 };
      sectorOpp[sec].total += opp;
      if (isNZ) sectorOpp[sec].nz += opp; else sectorOpp[sec].au += opp;
    });
  });
  const sectorRows = Object.entries(sectorOpp).sort((x,y)=>y[1].total-x[1].total);
  const maxSectorOpp = Math.max(...sectorRows.map(r=>r[1].total), 1);

  // Find weaknesses: accounts with < 50% completion at current stage
  const weaknesses = [];
  accounts.forEach(a => {
    const comp = getStageCompletion(a.id, a.current_stage);
    if (comp.pct < 50 && comp.total > 0) {
      weaknesses.push({ id: a.id, name: a.company_name, stage: STAGES[a.current_stage].name, pct: comp.pct, tier: a.tier });
    }
  });
  weaknesses.sort((a, b) => a.pct - b.pct);

  const sectorSection = showSector ? `
    <div class="dash-section" style="flex:1 1 300px;min-width:280px;margin:0;padding:12px 16px">
      <h3 style="margin:0 0 8px">Opportunity by Sector</h3>
      <div style="display:flex;align-items:center;gap:8px;margin:0 0 4px">
        <div style="width:120px;flex-shrink:0"></div>
        <div style="width:100px;flex-shrink:0"></div>
        <div style="flex:1;display:flex;justify-content:center;gap:12px;font-size:13px;font-weight:600;color:var(--g500)">
          <span style="display:flex;align-items:center;gap:4px"><span style="width:11px;height:11px;border-radius:3px;background:var(--vic-orange)"></span>AU</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:11px;height:11px;border-radius:3px;background:#3b82f6"></span>NZ</span>
        </div>
        <div style="width:100px;flex-shrink:0"></div>
      </div>
      <div class="funnel-chart">
        ${sectorRows.length ? sectorRows.map(([sec,o]) => `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;padding:7px 6px;margin-left:-6px;margin-right:-6px">
            <div style="width:120px;flex-shrink:0;font-size:13px;font-weight:600;text-align:left;color:var(--g600);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(sec)}</div>
            <div style="width:100px;flex-shrink:0;font-size:13px;font-weight:600;color:var(--vic-orange);text-align:right;white-space:nowrap">${o.au ? '$'+formatNumber(Math.round(o.au)) : ''}</div>
            <div style="flex:1;height:10px;background:var(--g100);border-radius:5px;overflow:hidden;position:relative">
              <div style="display:flex;height:100%;width:${Math.max(o.total/maxSectorOpp*100,3)}%;border-radius:5px;overflow:hidden">
                <div style="width:${o.total?o.au/o.total*100:0}%;height:100%;background:var(--vic-orange)"></div>
                <div style="width:${o.total?o.nz/o.total*100:0}%;height:100%;background:#3b82f6"></div>
              </div>
            </div>
            <div style="width:100px;flex-shrink:0;font-size:13px;font-weight:600;color:#3b82f6;text-align:left;white-space:nowrap">${o.nz ? '$'+formatNumber(Math.round(o.nz)) : ''}</div>
          </div>
        `).join('') : '<div style="color:var(--g400);font-size:13px;padding:8px 0">No sector data</div>'}
      </div>
    </div>` : '';

  const pipeStages = [1,2,3,4,5];
  const pdir = state.pipeSortDir === 'asc' ? 1 : -1;
  if (state.pipeSortCol === 'accts') pipeStages.sort((a,b)=>pdir*(stageCounts[a-1]-stageCounts[b-1]));
  else if (state.pipeSortCol === 'opp') pipeStages.sort((a,b)=>pdir*(stageOpp[a-1]-stageOpp[b-1]));
  else pipeStages.sort((a,b)=>pdir*(a-b));
  const pipelineSection = showPipeline ? `
    <div class="dash-section" style="flex:1 1 380px;min-width:300px;margin:0;padding:12px">
      <h3 style="margin:0 0 8px;font-size:12px">Conversion Pipeline</h3>
      <div class="funnel-chart">
        <div style="display:flex;align-items:center;gap:8px;padding:2px 0 6px;border-bottom:1px solid var(--g200);margin-bottom:4px">
          <div onclick="pipeSort('stage')" style="width:140px;flex-shrink:0;font-size:12px;font-weight:600;color:${state.pipeSortCol==='stage'?'var(--vic-orange)':'var(--g500)'};cursor:pointer">Stage${pipeIcon('stage')}</div>
          <div style="flex:1;display:flex;justify-content:center;gap:12px;font-size:11px;color:var(--g500)">
            ${['#94A3B8','#38BDF8','#34D399','#FBBF24','#F58220'].map((c,i)=>`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:${c}"></span>${STAGES[i+1].name}</span>`).join('')}
          </div>
          <div onclick="pipeSort('accts')" style="width:56px;flex-shrink:0;text-align:center;font-size:12px;font-weight:600;color:${state.pipeSortCol==='accts'?'var(--vic-orange)':'var(--g500)'};cursor:pointer">Accts${pipeIcon('accts')}</div>
        </div>
        ${pipeStages.map(s => `
          <div class="funnel-row" onclick="filterByStage(${s})" style="cursor:pointer" title="View ${STAGES[s].name} accounts">
            <div class="funnel-row-label">${STAGES[s].name.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase())}</div>
            <div class="funnel-row-bar-wrap">
              <div class="funnel-row-bar" style="width:${Math.max(stageCounts[s-1]/maxCount*100, 8)}%;background:${s===1?'#94A3B8':s===2?'#38BDF8':s===3?'#34D399':s===4?'#FBBF24':'#F58220'}"></div>
            </div>
            <div style="width:56px;flex-shrink:0;text-align:center;font-size:13px;font-weight:600;color:var(--g700)">${stageCounts[s-1]}</div>
          </div>
        `).join('')}
      </div>
    </div>` : '';

  let html = `
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin:0 16px 10px;align-items:flex-start">
    ${pipelineSection}
    ${sectorSection}
    </div>`;

  // Team Scoreboard (all users)
  {
    const filteredAccounts = accounts;
    const repProfiles = (state.profiles||[]).filter(p => (p.role === 'rep' || p.role === 'manager' || p.role === 'admin') && p.role !== 'director' && !state.dashFilterManager.includes(p.id) && (state.dashFilterRep.length === 0 || state.dashFilterRep.includes(p.id)));
    const repData = repProfiles.map(p => {
      const pAccts = filteredAccounts.filter(a => a.assigned_to === p.id);
      const rev = pAccts.reduce((s,a) => s + toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency), 0);
      const stages = [0,0,0,0,0];
      pAccts.forEach(a => stages[a.current_stage-1]++);
      const avgStage = pAccts.length ? (pAccts.reduce((s,a)=>s+a.current_stage,0)/pAccts.length) : 0;
      const stagesAdv = pAccts.reduce((sum,a) => sum + stageCrossingsInMonth(a, state.dashStageMonth), 0);
      return { ...p, accts: pAccts.length, rev, stages, avgStage, stagesAdv };
    });

    // Sort scoreboard
    const sbDir = state.sbSortDir === 'asc' ? 1 : -1;
    if (state.sbSortCol === 'name') repData.sort((a,b) => sbDir * (a.full_name||'').localeCompare(b.full_name||''));
    else if (state.sbSortCol === 'accts') repData.sort((a,b) => sbDir * (a.accts - b.accts));
    else if (state.sbSortCol === 'prog') repData.sort((a,b) => sbDir * (a.stagesAdv - b.stagesAdv));
    else if (state.sbSortCol === 'opp') repData.sort((a,b) => sbDir * (a.rev - b.rev));

    const stageColors = ['#94A3B8','#38BDF8','#34D399','#FBBF24','#F58220'];
    const sbIcon = (col) => {
      if (state.sbSortCol !== col) return '<span style="opacity:.3;font-size:10px"> ⇅</span>';
      return state.sbSortDir === 'asc' ? '<span style="font-size:10px"> ↑</span>' : '<span style="font-size:10px"> ↓</span>';
    };

    const drilled = state.dashFilterRep.length === 1 && state.dashFilterStage !== 'all';
    if (drilled && !showSector) {
      html += keyAccountsTableSection();
    } else if (repData.length && !showSector) {
      let rows = repData.map(d => `
        <div onclick="setDashFilter('dashFilterRep','${d.id}')" style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--g100);cursor:pointer;transition:background .15s" onmouseover="this.style.background='var(--g50)'" onmouseout="this.style.background=''">
          <div style="width:140px;flex-shrink:0">
            <div style="font-weight:600;font-size:13px;color:var(--g700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.full_name||'—')}</div>
          </div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;gap:1px;height:22px;border-radius:4px;overflow:hidden;width:100%${d.accts?'':''}">
              ${d.accts ? d.stages.map((c,i) => c > 0 ? `<div onclick="event.stopPropagation();sbDrillStage('${d.id}',${i+1})" style="flex:${c};background:${stageColors[i]};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer" title="${esc(d.full_name||'')} · ${STAGES[i+1].name}: ${c} — click to list">${c}</div>` : '').join('') : `<div style="flex:1;background:var(--g100);border-radius:4px"></div>`}
            </div>
          </div>
          <div style="width:100px;flex-shrink:0;text-align:right;font-size:13px;color:var(--g600)">
            $${formatNumber(Math.round(d.rev))}
          </div>
          <div style="width:56px;flex-shrink:0;text-align:center;font-size:13px;color:var(--g600)">
            ${d.stagesAdv}
          </div>
        </div>
      `).join('');
      html += `<div class="dash-section" style="padding:12px">
        <h3 style="margin:0 0 8px;font-size:12px">Team Performance</h3>
        <div style="display:flex;align-items:center;gap:8px;padding:2px 0;border-bottom:1px solid var(--g200)">
          <div onclick="sbSort('name')" style="width:140px;flex-shrink:0;font-size:12px;font-weight:600;color:${state.sbSortCol==='name'?'var(--vic-orange)':'var(--g500)'};cursor:pointer">Name${sbIcon('name')}</div>
          <div style="flex:1;display:flex;justify-content:center;gap:12px;font-size:11px;color:var(--g500)">
            ${['#94A3B8','#38BDF8','#34D399','#FBBF24','#F58220'].map((c,i)=>`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:${c}"></span>${STAGES[i+1].name}</span>`).join('')}
          </div>
          <div onclick="sbSort('opp')" style="width:100px;flex-shrink:0;text-align:right;font-size:12px;font-weight:600;color:${state.sbSortCol==='opp'?'var(--vic-orange)':'var(--g500)'};cursor:pointer">Opportunity${sbIcon('opp')}</div>
          <div onclick="sbSort('prog')" style="width:56px;flex-shrink:0;text-align:center;font-size:12px;font-weight:600;color:${state.sbSortCol==='prog'?'var(--vic-orange)':'var(--g500)'};cursor:pointer">Steps${sbIcon('prog')}</div>
        </div>
        <div>
          ${rows}
        </div>
      </div>`;
    }
  }

  el.innerHTML = html;
}

// Shared product-acceptance box — used by the dashboard Acceptance Matrix tab AND the
// customer page Acceptance tab, so styling changes mirror across both.
function acceptanceBox(label, pct, divider, onclick) {
  const c = pct > 0 ? '#F58220' : '#94A3B8';
  return `<div ${onclick ? `class="mx-click" onclick="${onclick}"` : ''} style="padding:8px 10px;text-align:center;${divider ? 'border-right:1px solid var(--g200);' : ''}${onclick ? 'cursor:pointer' : ''}">
    <div style="font-size:12px;font-weight:600;color:var(--g700);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(label)}</div>
    <div style="font-size:20px;font-weight:700;color:${c}">${pct}%</div>
  </div>`;
}

function renderDashboardMatrix() {
  const el = document.getElementById('dash-content');
  const rows = state.matrixConfig.rows;
  const cols = state.matrixConfig.cols;
  const statuses = state.matrixConfig.statuses;
  if (!rows.length || !cols.length) {
    el.innerHTML = '<div class="dash-section" style="color:var(--g400);font-size:13px">No acceptance matrix configured yet. Set up product rows and milestone columns in Admin.</div>';
    return;
  }
  const approvedStatus = statuses.find(s => s.label === 'Approved');
  const rejectedStatus = statuses.find(s => s.label === 'Not Allowed');
  const naStatus = statuses.find(s => s.label === 'N/A');
  const totalCells = rows.length * cols.length;
  const acceptancePct = (a) => {
    const data = state.matrixData[a.id] || [];
    let approved = 0, na = 0;
    data.forEach(d => {
      if (approvedStatus && d.status_id === approvedStatus.id) approved++;
      else if (naStatus && d.status_id === naStatus.id) na++;
    });
    const eligible = totalCells - na;
    return eligible > 0 ? Math.round(approved / eligible * 100) : 0;
  };
  const accounts = getDashFilteredAccounts().slice().sort((a,b) => a.company_name.localeCompare(b.company_name));

  // Per-product acceptance (overall, across the filtered accounts)
  const perProduct = {};
  rows.forEach(r => perProduct[r.id] = { approved: 0, inProgress: 0, rejected: 0, total: 0, eligible: 0 });
  accounts.forEach(a => {
    const data = state.matrixData[a.id] || [];
    rows.forEach(row => cols.forEach(col => {
      perProduct[row.id].total++;
      const cell = data.find(d => d.row_id === row.id && d.col_id === col.id);
      if (cell) {
        if (approvedStatus && cell.status_id === approvedStatus.id) perProduct[row.id].approved++;
        else if (rejectedStatus && cell.status_id === rejectedStatus.id) perProduct[row.id].rejected++;
        else if (naStatus && cell.status_id === naStatus.id) {}
        else if (cell.status_id) { const st = statuses.find(s => s.id === cell.status_id); if (st && st.label !== 'Not Started') perProduct[row.id].inProgress++; }
      }
    }));
  });
  rows.forEach(r => {
    let naCount = 0;
    accounts.forEach(a => { const data = state.matrixData[a.id] || []; cols.forEach(col => { const cell = data.find(d => d.row_id === r.id && d.col_id === col.id); if (cell && naStatus && cell.status_id === naStatus.id) naCount++; }); });
    perProduct[r.id].eligible = perProduct[r.id].total - naCount;
  });
  const prodHtml = `<div style="display:grid;grid-template-columns:repeat(5,1fr)">` + rows.map((r, i) => {
    const pp = perProduct[r.id];
    const pct = pp.eligible > 0 ? Math.round(pp.approved / pp.eligible * 100) : 0;
    const divider = (i % 5 !== 4) && (i !== rows.length - 1);
    return acceptanceBox(r.label, pct, divider);
  }).join('') + `</div>`;

  const accIcon = (col) => state.accSortCol === col ? (state.accSortDir === 'asc' ? ' ↑' : ' ↓') : '';
  const accActive = (col) => state.accSortCol === col ? ';color:var(--vic-orange)' : '';
  const accHead = 'padding:10px 0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);border-bottom:2px solid var(--g200);white-space:nowrap;cursor:pointer;user-select:none';
  const accDir = state.accSortDir === 'asc' ? 1 : -1;
  const _mStart = state.dashStageMonth + '-01T00:00:00.000Z';
  const _mp = state.dashStageMonth.split('-').map(Number);
  const _mEnd = new Date(Date.UTC(_mp[0], _mp[1], 1)).toISOString();
  const stepGain = (a) => { let g = 0; (state.matrixData[a.id] || []).forEach(d => { if (approvedStatus && d.status_id === approvedStatus.id && d.updated_at && d.updated_at >= _mStart && d.updated_at < _mEnd) g++; }); return g; };
  const rowsHtml = `<div style="display:grid;grid-template-columns:max-content 1fr 56px 44px;column-gap:12px">` +
    `<div style="${accHead}${accActive('name')}" onclick="accSort('name')">Customer${accIcon('name')}</div>` +
    `<div style="${accHead}${accActive('pct')}" onclick="accSort('pct')">Acceptance${accIcon('pct')}</div>` +
    `<div style="${accHead}${accActive('step')};text-align:center" onclick="accSort('step')">Step${accIcon('step')}</div>` +
    `<div style="${accHead}${accActive('pctval')};text-align:right" onclick="accSort('pctval')">%${accIcon('pctval')}</div>` +
    accounts.slice().sort((a, b) => {
      if (state.accSortCol === 'name') return accDir * a.company_name.localeCompare(b.company_name);
      if (state.accSortCol === 'step') return accDir * (stepGain(a) - stepGain(b)) || a.company_name.localeCompare(b.company_name);
      return accDir * (acceptancePct(a) - acceptancePct(b)) || a.company_name.localeCompare(b.company_name);
    }).map(a => {
      const pct = acceptancePct(a);
      const color = pct > 0 ? '#F58220' : '#94A3B8';
      const cell = 'display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--g100);cursor:pointer';
      const sg = stepGain(a);
      const sgHtml = sg > 0 ? `▲ ${sg}` : sg < 0 ? `▼ ${Math.abs(sg)}` : '0';
      const sgColor = sg > 0 ? 'var(--success)' : sg < 0 ? '#ef4444' : 'var(--g400)';
      const aData = state.matrixData[a.id] || [];
      const aCounts = {}; statuses.forEach(s => aCounts[s.id] = 0);
      aData.forEach(d => { if (aCounts[d.status_id] !== undefined) aCounts[d.status_id]++; });
      const aActioned = statuses.reduce((n,s) => s.label === 'Not Started' ? n : n + (aCounts[s.id]||0), 0);
      const barSegs = statuses.map(s => { const cnt = s.label === 'Not Started' ? (totalCells - aActioned) : (aCounts[s.id] || 0); if (cnt <= 0) return ''; const segStyle = s.label === 'Not Started' ? 'background:#1f2937' : `background:${s.label === 'N/A' ? '#94A3B8' : s.color}`; return `<div style="width:${cnt/totalCells*100}%;${segStyle}" title="${esc(s.label)}: ${cnt}"></div>`; }).join('');
      return `<div onclick="showAccountDetail('${a.id}')" style="display:contents">
        <div style="${cell};flex-direction:column;align-items:flex-start;justify-content:center;white-space:nowrap"><span style="font-size:13px;font-weight:600;color:var(--g700)">${esc(a.company_name)}</span>${a.hq_city ? `<span style="font-size:12px;color:var(--g600);margin-top:1px">${esc(a.hq_city)}</span>` : ''}</div>
        <div style="${cell}"><div style="width:100%;height:10px;background:var(--g100);border-radius:5px;overflow:hidden;display:flex">${barSegs}</div></div>
        <div style="${cell};justify-content:center;font-size:13px;font-weight:700;color:${sgColor}">${sgHtml}</div>
        <div style="${cell};justify-content:flex-end;font-size:13px;font-weight:700;color:var(--g700)">${pct}%</div>
      </div>`;
    }).join('') + `</div>`;
  let totApproved = 0, totEligible = 0;
  rows.forEach(r => { totApproved += perProduct[r.id].approved; totEligible += perProduct[r.id].eligible; });
  const overallPct = totEligible > 0 ? Math.round(totApproved / totEligible * 100) : 0;
  const overallColor = overallPct > 0 ? '#F58220' : '#94A3B8';
  // Aggregate status composition across all filtered accounts (for the top bar)
  const totCounts = {}; const statusGain = {}; statuses.forEach(s => { totCounts[s.id] = 0; statusGain[s.id] = 0; });
  accounts.forEach(a => (state.matrixData[a.id] || []).forEach(d => { if (totCounts[d.status_id] !== undefined) { totCounts[d.status_id]++; if (d.updated_at && d.updated_at >= _mStart && d.updated_at < _mEnd) statusGain[d.status_id]++; } }));
  const grandCells = accounts.length * totalCells;
  const totActioned = statuses.reduce((n,s) => s.label === 'Not Started' ? n : n + (totCounts[s.id]||0), 0);
  // Per-status breakdown boxes: share of all matrix cells + points gained this month
  const statusBoxes = grandCells > 0 ? statuses.map(s => {
    const cnt = s.label === 'Not Started' ? (grandCells - totActioned) : (totCounts[s.id] || 0);
    const boxPct = Math.round(cnt / grandCells * 100);
    const gPts = Math.round((statusGain[s.id] || 0) / grandCells * 1000) / 10;
    const gColor = gPts > 0 ? 'var(--success)' : gPts < 0 ? '#ef4444' : 'var(--g400)';
    const gArrow = gPts > 0 ? '▲' : gPts < 0 ? '▼' : '–';
    const bc = s.label === 'Not Started' ? '#1f2937' : (s.label === 'N/A') ? '#94A3B8' : s.color;
    return `<div style="flex:1;text-align:center;padding:8px 6px;border-radius:6px;background:${bc}14;border:1px solid ${bc}33">
      <div style="font-size:11px;font-weight:600;color:${bc};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.label)}</div>
      <div style="font-size:20px;font-weight:700;color:${bc};line-height:1.1;margin-top:2px">${boxPct}%</div>
      <div style="font-size:12px;font-weight:700;color:${gColor};margin-top:3px">${gArrow} ${Math.abs(gPts)} pts</div>
    </div>`;
  }).join('') : '';
  const topBarSegs = grandCells > 0 ? statuses.map(s => { const cnt = s.label === 'Not Started' ? (grandCells - totActioned) : (totCounts[s.id] || 0); if (cnt <= 0) return ''; const segStyle = s.label === 'Not Started' ? 'background:#1f2937' : `background:${s.label === 'N/A' ? '#94A3B8' : s.color}`; return `<div style="width:${cnt/grandCells*100}%;${segStyle}" title="${esc(s.label)}: ${cnt}"></div>`; }).join('') : '';
  // Step change: percentage points gained from approvals recorded within the selected month.
  // (Cells store current status + last-changed date, so this captures gains; genuine
  //  decreases can't be reconstructed without full status history.)
  let gainedApproved = 0;
  accounts.forEach(a => gainedApproved += stepGain(a));
  const deltaPts = totEligible > 0 ? Math.round(gainedApproved / totEligible * 1000) / 10 : 0;
  const dColor = deltaPts > 0 ? 'var(--success)' : deltaPts < 0 ? '#ef4444' : 'var(--g400)';
  const dArrow = deltaPts > 0 ? '▲' : deltaPts < 0 ? '▼' : '–';
  el.innerHTML = `<div class="dash-section" style="padding:14px 16px">
      <div style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--g500);margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px">
        <span>Product Acceptance · ${stageMonthLabel()}</span>
        <span onclick="const i=this.querySelector('input');i.showPicker?i.showPicker():i.focus();" title="Change month — look back" style="cursor:pointer;color:var(--g400);display:inline-flex;align-items:center;position:relative">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <input type="month" value="${state.dashStageMonth}" max="${new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0')}" onchange="setStageMonth(this.value)" style="position:absolute;left:0;bottom:0;width:1px;height:1px;opacity:0;pointer-events:none">
        </span>
      </div>
      <div style="display:flex;gap:6px">${statusBoxes}</div>
      <div style="height:10px;background:var(--g100);border-radius:5px;overflow:hidden;margin:12px 0 0;display:flex">${topBarSegs}</div>
    </div>
    <div class="dash-section">
      ${prodHtml}
    </div>
    <div class="dash-section">
      ${accounts.length ? rowsHtml : '<div style="color:var(--g400);font-size:13px;padding:12px 0">No accounts match the current filters.</div>'}
    </div>`;
}

function keyAccountsTableSection() {
  state.accounts.forEach(a => { a.current_stage = recalcCurrentStage(a.id); });
  let accounts = getDashFilteredAccounts();
  const kDir = state.kaSortDir === 'asc' ? 1 : -1;
  const repName = (uid) => { const p = state.profiles.find(pr => pr.id === uid); return p ? p.full_name : '—'; };
  const lastAct = (a) => (state.checklist[a.id]||[]).reduce((m,c) => c.completed_at && c.completed_at > m ? c.completed_at : m, '');
  const oppVal = (a) => toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency);
  accounts.sort((a,b) => {
    if (state.kaSortCol === 'progress') return kDir * (a.current_stage - b.current_stage) || a.company_name.localeCompare(b.company_name);
    if (state.kaSortCol === 'opp') return kDir * (oppVal(a) - oppVal(b)) || a.company_name.localeCompare(b.company_name);
    if (state.kaSortCol === 'rep') return kDir * repName(a.assigned_to).localeCompare(repName(b.assigned_to)) || a.company_name.localeCompare(b.company_name);
    if (state.kaSortCol === 'activity') return kDir * lastAct(a).localeCompare(lastAct(b)) || a.company_name.localeCompare(b.company_name);
    return kDir * a.company_name.localeCompare(b.company_name);
  });
  const stageColors = ['','#94A3B8','#38BDF8','#34D399','#FBBF24','#F58220'];
  const kIcon = (col) => state.kaSortCol === col ? (state.kaSortDir === 'asc' ? ' ↑' : ' ↓') : '';
  const kActive = (col) => state.kaSortCol === col ? ';color:var(--vic-orange)' : '';

      if (isCur) statusBar += `<div style="width:${sc.pct}%;height:100%;background:${stageColors[s]};border-radius:2px"></div>`;
      statusBar += '</div>';
    }
    statusBar += '</div>';
    return `<tr onclick="showAccountDetail('${a.id}')" style="cursor:pointer">
      <td style="white-space:nowrap"><strong style="color:var(--g700)">${esc(a.company_name)}</strong>${a.hq_city ? `<div style="color:var(--g600);font-weight:400;font-size:12px;margin-top:1px">${esc(a.hq_city)}</div>` : ''}</td>
      <td>${statusBar}</td>
      <td style="font-size:13px;color:var(--g600);white-space:nowrap">${opp}</td>
      <td style="font-size:13px;color:var(--g700);white-space:nowrap">${esc(repName(a.assigned_to))}</td>
      <td style="font-size:12px;color:var(--g400);white-space:nowrap;text-align:center">${lastTxt}</td>

  el.innerHTML = `<div id="stalled-section" class="dash-section"><div class="table-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 0 8px">

      <select onchange="state.stalledDays=parseInt(this.value);renderDashboard()" style="width:110px;flex:none;padding:4px 8px;border:1px solid var(--g200);border-radius:4px;font-size:12px;color:var(--g500);background:var(--white);cursor:pointer">
        ${[14,30,60,90,120].map(d => `<option value="${d}"${state.stalledDays===d?' selected':''}>${d} days</option>`).join('')}
